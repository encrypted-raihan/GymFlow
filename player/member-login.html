<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>GymFlow | Member Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0d110f; 
            color: #f1f5f3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Strict Adherence to [2025-10-02]: 10px radius */
        .rounded-gym { border-radius: 10px !important; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: #1a1f1c;
            border: 1px solid #2d332f;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            width: 100%;
            color: white;
            transition: all 0.2s;
            font-size: 14px;
            outline: none;
        }

        .input-field:focus {
            border-color: #22c55e;
            background: #242a26;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        .btn-login {
            background: #22c55e;
            color: #052e16;
            width: 100%;
            padding: 1.1rem;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-login:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(34, 197, 94, 0.4);
        }

        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: #22c55e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #052e16;
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>

    <div class="p-4 w-full flex justify-center">
        <div class="glass-card">
            <div class="text-center mb-10">
                <div class="brand-icon">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">
                    Member.<span class="text-green-500">Portal</span>
                </h1>
                <p class="text-[10px] font-black text-zinc-500 tracking-[0.2em] uppercase mt-3">Identity Verification Required</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500 ml-1 mb-2 block">Full Name</label>
                    <input type="text" id="memberName" placeholder="Name" class="input-field">
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] text-zinc-500 ml-1 mb-2 block">Password</label>
                    <input type="tel" id="memberPhone" placeholder="mobile number" class="input-field">
                </div>

                <button onclick="handleLogin()" id="loginBtn" class="btn-login">
                    Initialize Session
                </button>
            </div>

            <p class="text-center text-[9px] font-bold text-zinc-700 mt-10 uppercase tracking-[0.3em]">
                Protected by GymFlow Cloud
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleLogin = async () => {
            const nameInput = document.getElementById('memberName').value.trim();
            const phoneInput = document.getElementById('memberPhone').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!nameInput || !phoneInput) {
                alert("Credentials required.");
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                const membersRef = collection(db, "members");
                const q = query(membersRef, 
                    where("name", "==", nameInput), 
                    where("phone", "==", phoneInput)
                );

                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const memberDoc = querySnapshot.docs[0];
                    const memberData = memberDoc.data();

                    localStorage.setItem("memberId", memberDoc.id);
                    localStorage.setItem("gymId", memberData.gymId || "default");
                    
                    window.location.href = "member.html";
                } else {
                    alert("Account not found. Verify details with staff.");
                    btn.innerText = "INITIALIZE SESSION";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Network connectivity error.");
                btn.innerText = "INITIALIZE SESSION";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
