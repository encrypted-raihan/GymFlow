<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>GymFlow | Member Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05);
        }
        .input-field {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            width: 100%;
            transition: all 0.2s;
            font-weight: 600;
        }
        .input-field:focus {
            border-color: #0f172a;
            background: white;
            outline: none;
        }
        .btn-login {
            background: #0f172a;
            color: white;
            width: 100%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 1.5rem;
            transition: all 0.2s;
        }
        .btn-login:active { transform: scale(0.96); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="p-4 w-full flex justify-center">
        <div class="login-card">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-900 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-black text-slate-900">Member Portal</h1>
                <p class="text-sm font-bold text-slate-400 mt-1">Enter details to track progress</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">Phone Number</label>
                    <input type="tel" id="memberPhone" placeholder="Mobile Number" class="input-field">
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-4 mb-2 block">Password</label>
                    <input type="password" id="memberPassword" placeholder="••••••••" class="input-field">
                </div>

                <button onclick="handleLogin()" id="loginBtn" class="btn-login shadow-xl shadow-slate-200">
                    Enter Gym
                </button>
            </div>

            <p class="text-center text-[10px] font-bold text-slate-300 mt-8 uppercase tracking-widest">
                Protected by GymFlow Cloud
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleLogin = async () => {
            const phoneInput = document.getElementById('memberPhone').value.trim();
            const passwordInput = document.getElementById('memberPassword').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!phoneInput || !passwordInput) {
                alert("Please enter both Phone number and Password.");
                return;
            }

            btn.innerText = "Verifying...";
            btn.disabled = true;

            try {
                // Search Firestore "members" collection for matching phone AND password schema matching script.js keys
                const membersRef = collection(db, "members");
                const q = query(membersRef, 
                    where("phone", "==", phoneInput), 
                    where("password", "==", passwordInput)
                );

                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const memberDoc = querySnapshot.docs[0];
                    const memberData = memberDoc.data();

                    localStorage.setItem("memberId", memberDoc.id);
                    localStorage.setItem("gymId", memberData.gymId || "default");
                    
                    window.location.href = "member.html";
                } else {
                    alert("Invalid phone number or password! Please check credentials or contact your Gym Admin.");
                    btn.innerText = "Enter Gym";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Check your internet connection and try again.");
                btn.innerText = "Enter Gym";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
