<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>GymFlow | Super Admin</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="p-6 lg:p-12">

    <div id="adminAuth" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center">
            <h1 class="text-3xl font-black tracking-tighter mb-2">Master Login</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8">System Infrastructure</p>
            <input id="masterUser" type="text" placeholder="Username" class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border border-slate-100 outline-none">
            <input id="masterPass" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-slate-50 rounded-2xl border border-slate-100 outline-none">
            <button onclick="checkMasterAuth()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-100 uppercase tracking-widest text-xs">Verify Identity</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter">Onboard <span class="text-blue-600">Gyms.</span></h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-[0.3em] mt-2">Platform Management</p>
            </div>
            
            <button onclick="window.location.href='payment-management.html'" 
                class="flex items-center gap-3 px-6 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-emerald-500 hover:text-emerald-600 transition-all group">
                <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <div class="text-left">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 leading-none">Financial Audit</p>
                    <p class="text-sm font-black">Payment Management</p>
                </div>
                <svg class="w-4 h-4 ml-2 text-slate-300 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <div class="glass-card p-10 rounded-[3rem] mb-12 border-2 border-dashed border-blue-100">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <input id="newGymName" placeholder="Gym Name" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input id="newGymUser" placeholder="Assign Username" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input id="newGymPass" placeholder="Assign Password" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="onboardGym()" class="bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition uppercase text-[10px] tracking-widest active:scale-95">Create Gym Portal</button>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Gym Identity</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Credentials</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="gymTableBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
