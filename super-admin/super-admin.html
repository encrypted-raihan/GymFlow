<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>GymFlow | Super Admin</title>
    <style>
        #adminDashboard {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="p-6 lg:p-12">
<body class="p-6 lg:p-12">

    <!-- 🔄 AUTH LOADER (WHITE THEME) -->
    <div id="authLoader" class="fixed inset-0 flex items-center justify-center bg-white z-[300]">
        <div class="flex flex-col items-center gap-4">
            <div class="w-8 h-8 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">
                Verifying session...
            </p>
        </div>
    </div>

    <!-- 🔐 LOGIN (WHITE THEME) -->
    <div id="adminAuth" class="hidden fixed inset-0 z-[200] bg-white flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md border border-slate-200 shadow-xl text-center">
            <h1 class="text-3xl font-black tracking-tighter mb-2">Master Login</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8">
                System Infrastructure
            </p>

            <input id="masterUser" type="text" placeholder="Username"
                class="w-full p-4 mb-3 bg-slate-50 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">

            <input id="masterPass" type="password" placeholder="Password"
                class="w-full p-4 mb-6 bg-slate-50 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">

            <button onclick="checkMasterAuth()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-md uppercase tracking-widest text-xs transition">
                Verify Identity
            </button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">

    <!-- LEFT -->
    <div>
        <h1 class="text-4xl font-black tracking-tighter">
            Onboard <span class="text-blue-600">Gyms.</span>
        </h1>
        <p class="text-slate-400 font-bold text-xs uppercase tracking-[0.3em] mt-2">
            Platform Management
        </p>
    </div>

    <!-- RIGHT -->
    <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">

        <!-- 🔍 SEARCH -->
        <input id="gymSearch" type="text" placeholder="Search gyms..."
            class="px-4 py-3 rounded-2xl border border-slate-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-64">

        <!-- 💸 NAV -->
        <button onclick="window.location.href='payment-management.html'"
            class="flex items-center gap-2 px-4 py-3 bg-white border border-slate-200 rounded-2xl hover:border-emerald-500 hover:text-emerald-600 transition text-sm font-bold">
            Payments
        </button>

        <!-- 🚪 LOGOUT -->
        <button onclick="adminLogout()"
            class="px-4 py-3 bg-red-500 hover:bg-red-600 text-white rounded-2xl text-sm font-black uppercase tracking-widest transition">
            Logout
        </button>

    </div>
</div>

        <div class="glass-card p-10 rounded-[3rem] mb-12 border-2 border-dashed border-blue-100">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <input id="newGymName" placeholder="Gym Name" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input id="newGymUser" placeholder="Assign Username" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <input id="newGymPass" placeholder="Assign Password" class="p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="onboardGym()" class="bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition uppercase text-[10px] tracking-widest active:scale-95">Create Gym Portal</button>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Gym Identity</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Credentials</th>
                        <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="gymTableBody" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>

    
</body>
<script type="module" src="admin.js"></script>
</html>
