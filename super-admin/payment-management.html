<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Payment Management | Super Admin</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        /* Custom scrollbar for history modal */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
    <div class="flex items-center gap-4">
        <button onclick="window.location.href='super-admin.html'" 
            class="group flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-slate-500 hover:text-slate-900 hover:border-slate-300 transition-all shadow-sm active:scale-95">
            <svg class="w-3 h-3 transform group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            BACK
        </button>
        
        <div>
            <h1 class="text-2xl font-black text-slate-900 leading-tight">System <span class="text-emerald-600">Audit</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Manage Credentials & Audit Payment Logs</p>
        </div>
    </div>

    <div class="hidden md:block px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
        <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Finance Module v1.0</span>
    </div>
</div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 text-[10px] font-black uppercase text-slate-400">Gym Name</th>
                        <th class="p-4 text-[10px] font-black uppercase text-slate-400">UPI / Merchant</th>
                        <th class="p-4 text-[10px] font-black uppercase text-slate-400 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="gymTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-black text-slate-900 mb-6">Update Credentials</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">UPI ID (VPA)</label>
                    <input type="text" id="editUpiId" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-medium text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Merchant Name</label>
                    <input type="text" id="editMerchantName" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-medium text-sm">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal('editModal')" class="flex-1 py-3 font-bold text-slate-500 bg-slate-100 rounded-xl text-xs">CANCEL</button>
                    <button onclick="saveChanges()" class="flex-1 py-3 font-bold text-white bg-emerald-600 rounded-xl text-xs">SAVE CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[85vh]">
            <div class="p-6 border-b flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-black text-slate-900" id="historyGymTitle">Payment History</h2>
                    <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Verified Transactions</p>
                </div>
                <button onclick="closeModal('historyModal')" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="overflow-y-auto p-4 custom-scroll bg-slate-50">
                <table class="w-full text-left bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-3 text-[9px] font-black uppercase text-slate-400">Member</th>
                            <th class="p-3 text-[9px] font-black uppercase text-slate-400">Verify ID</th>
                            <th class="p-3 text-[9px] font-black uppercase text-slate-400">Amount</th>
                            <th class="p-3 text-[9px] font-black uppercase text-slate-400 text-right">Date</th>
                        </tr>
                    </thead>
                    <tbody id="historyList" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentGymId = null;

        async function loadGyms() {
            const snap = await getDocs(collection(db, "gyms"));
            const tbody = document.getElementById('gymTableBody');
            tbody.innerHTML = '';

            snap.forEach((gymDoc) => {
                const data = gymDoc.data();
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4">
                        <p class="font-bold text-slate-800">${data.name || 'Unnamed Gym'}</p>
                        <p class="text-[9px] text-slate-400 font-mono">ID: ${gymDoc.id}</p>
                    </td>
                    <td class="p-4">
                        <p class="font-mono text-[10px] text-slate-600">${data.upiId || 'No UPI'}</p>
                        <p class="text-[10px] font-bold text-emerald-600">${data.merchantName || '-'}</p>
                    </td>
                    <td class="p-4 text-right space-x-4">
                        <button onclick="viewHistory('${gymDoc.id}', '${data.name}')" class="text-slate-400 hover:text-slate-900 font-black text-[10px] uppercase tracking-wider">History</button>
                        <button onclick="openEditModal('${gymDoc.id}', '${data.upiId || ''}', '${data.merchantName || ''}')" class="text-emerald-600 hover:text-emerald-700 font-black text-[10px] uppercase tracking-wider">Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.viewHistory = async (gymId, gymName) => {
            const list = document.getElementById('historyList');
            document.getElementById('historyGymTitle').innerText = gymName;
            document.getElementById('historyModal').classList.remove('hidden');
            list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-xs text-slate-400 animate-pulse font-bold">FETCHING AUDIT LOGS...</td></tr>`;

            try {
                const q = query(collection(db, "members"), where("gymId", "==", gymId), where("paymentStatus", "==", "paid"));
                const snap = await getDocs(q);
                
                if(snap.empty) {
                    list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-xs text-slate-400 italic">No payment history found for this gym.</td></tr>`;
                    return;
                }

                list.innerHTML = '';
                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const date = m.lastPaymentDate ? new Date(m.lastPaymentDate).toLocaleDateString([], {day:'2-digit', month:'short'}) : '---';
                    const verifyId = `${m.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`;
                    
                    const tr = document.createElement('tr');
                    tr.className = "text-xs";
                    tr.innerHTML = `
                        <td class="p-3 font-bold text-slate-700">${m.name}</td>
                        <td class="p-3 font-mono text-[10px] text-slate-500">${verifyId}</td>
                        <td class="p-3 font-black text-emerald-600">₹${m.monthlyFee}</td>
                        <td class="p-3 text-right text-slate-400 font-medium">${date}</td>
                    `;
                    list.appendChild(tr);
                });
            } catch (e) {
                list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-rose-500 text-xs">Error loading history.</td></tr>`;
            }
        };

        window.openEditModal = (id, upi, merchant) => {
            currentGymId = id;
            document.getElementById('editUpiId').value = upi;
            document.getElementById('editMerchantName').value = merchant;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.saveChanges = async () => {
            await updateDoc(doc(db, "gyms", currentGymId), {
                upiId: document.getElementById('editUpiId').value,
                merchantName: document.getElementById('editMerchantName').value
            });
            closeModal('editModal');
            loadGyms();
        };

        loadGyms();
    </script>
</body>
</html>
