<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>Super Admin | Payment Management</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        /* Custom scrollbar for history modal */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-active { background: #0f172a !important; color: white !important; }
    </style>
    <script>
    // SECURITY GATE: Redirects if user tries to type the URL directly
    // Updated to work with Vercel's clean URLs (handles both .html and non-.html)
    const ref = document.referrer.toLowerCase();
    const currentHost = window.location.hostname;

    // Logic: Allow if the referrer contains 'super-admin' OR if it's coming from your own site
    if (ref === '' || !ref.includes('super-admin')) {
        // If the user didn't come from the dashboard, send them back
        window.location.replace('super-admin.html');
    }
</script>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="window.location.replace('super-admin.html')" 
                    class="group flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black text-slate-500 hover:text-slate-900 hover:border-slate-300 transition-all shadow-sm active:scale-95">
                    <svg class="w-3 h-3 transform group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    BACK
                </button>
                
                <div>
                    <h1 class="text-2xl font-black text-slate-900 leading-tight">System <span class="text-emerald-600">Audit</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Manage Credentials & Audit Payment Logs</p>
                </div>
            </div>

            <div class="hidden md:block px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Finance Module v2.0</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 text-[10px] font-black uppercase text-slate-400">Gym Name</th>
                        <th class="p-4 text-[10px] font-black uppercase text-slate-400">UPI / Merchant</th>
                        <th class="p-4 text-[10px] font-black uppercase text-slate-400 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="gymTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-black text-slate-900 mb-6">Update Credentials</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">UPI ID (VPA)</label>
                    <input type="text" id="editUpiId" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-medium text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Merchant Name</label>
                    <input type="text" id="editMerchantName" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-medium text-sm">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal('editModal')" class="flex-1 py-3 font-bold text-slate-500 bg-slate-100 rounded-xl text-xs">CANCEL</button>
                    <button onclick="saveChanges()" class="flex-1 py-3 font-bold text-white bg-emerald-600 rounded-xl text-xs">SAVE CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden">
            <div class="p-6 border-b">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-xl font-black text-slate-900" id="historyGymTitle">Payment History</h2>
                        <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Audit Terminal</p>
                    </div>
                    <button onclick="closeModal('historyModal')" class="text-slate-400 hover:text-slate-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <input type="text" id="logSearch" oninput="filterLogs()" placeholder="Search Name, ID, or Date..." 
                            class="w-full p-3 pl-10 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-emerald-500 font-medium">
                        <svg class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="setTab('all')" id="tab-all" class="flex-1 py-2 text-[10px] font-black rounded-lg tab-active transition-all">ALL</button>
                        <button onclick="setTab('verified')" id="tab-verified" class="flex-1 py-2 text-[10px] font-black rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all">VERIFIED</button>
                        <button onclick="setTab('rejected')" id="tab-rejected" class="flex-1 py-2 text-[10px] font-black rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all">REJECTED</button>
                    </div>
                </div>
            </div>

            <div class="overflow-y-auto p-4 custom-scroll bg-slate-50 h-full">
                <table class="w-full text-left bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                    <tbody id="historyList" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentGymId = null;
        let rawLogs = []; 
        let activeTab = 'all';

        async function loadGyms() {
            const snap = await getDocs(collection(db, "gyms"));
            const tbody = document.getElementById('gymTableBody');
            tbody.innerHTML = '';

            snap.forEach((gymDoc) => {
                const data = gymDoc.data();
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4">
                        <p class="font-bold text-slate-800">${data.name || 'Unnamed Gym'}</p>
                        <p class="text-[9px] text-slate-400 font-mono">ID: ${gymDoc.id}</p>
                    </td>
                    <td class="p-4">
                        <p class="font-mono text-[10px] text-slate-600">${data.upiId || 'No UPI'}</p>
                        <p class="text-[10px] font-bold text-emerald-600">${data.merchantName || '-'}</p>
                    </td>
                    <td class="p-4 text-right space-x-4">
                        <button onclick="viewHistory('${gymDoc.id}', '${data.name}')" class="text-slate-400 hover:text-slate-900 font-black text-[10px] uppercase tracking-wider transition-all">History</button>
                        <button onclick="openEditModal('${gymDoc.id}', '${data.upiId || ''}', '${data.merchantName || ''}')" class="text-emerald-600 hover:text-emerald-700 font-black text-[10px] uppercase tracking-wider transition-all">Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.viewHistory = async (gymId, gymName) => {
            const list = document.getElementById('historyList');
            document.getElementById('historyGymTitle').innerText = gymName;
            document.getElementById('historyModal').classList.remove('hidden');
            document.getElementById('logSearch').value = '';
            list.innerHTML = `<tr><td class="p-8 text-center text-xs text-slate-400 animate-pulse font-bold">FETCHING AUDIT LOGS...</td></tr>`;

            try {
                const q = query(collection(db, "members"), where("gymId", "==", gymId));
                const snap = await getDocs(q);
                rawLogs = [];

                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const logs = m.paymentLogs || [];
                    const verifyId = `${m.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`;

                    logs.forEach(log => {
                        rawLogs.push({
                            name: m.name, verifyId, amount: m.monthlyFee, date: new Date(log.date),
                            dateStr: new Date(log.date).toLocaleDateString([], {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}),
                            type: log.type, message: log.message || '', isDenied: log.type === 'Denied'
                        });
                    });

                    if (m.paymentStatus === 'paid' && m.lastPaymentDate) {
                        const pDate = new Date(m.lastPaymentDate);
                        if (!logs.some(l => new Date(l.date).getTime() === pDate.getTime())) {
                            rawLogs.push({
                                name: m.name, verifyId, amount: m.monthlyFee, date: pDate,
                                dateStr: pDate.toLocaleDateString([], {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}),
                                type: 'Approved', message: 'Legacy Payment', isDenied: false
                            });
                        }
                    }
                });

                rawLogs.sort((a, b) => b.date - a.date);
                setTab('all');

            } catch (e) {
                console.error(e);
                list.innerHTML = `<tr><td class="p-8 text-center text-rose-500 text-xs">Sync Error.</td></tr>`;
            }
        };

        window.setTab = (type) => {
            activeTab = type;
            const tabs = ['all', 'verified', 'rejected'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === type) {
                    el.classList.add('tab-active');
                    el.classList.remove('bg-slate-100', 'text-slate-500');
                } else {
                    el.classList.remove('tab-active');
                    el.classList.add('bg-slate-100', 'text-slate-500');
                }
            });
            renderFilteredLogs();
        };

        window.filterLogs = () => renderFilteredLogs();

        function renderFilteredLogs() {
            const list = document.getElementById('historyList');
            const searchTerm = document.getElementById('logSearch').value.toLowerCase();
            
            const filtered = rawLogs.filter(log => {
                const matchesTab = activeTab === 'all' || 
                                  (activeTab === 'verified' && !log.isDenied) || 
                                  (activeTab === 'rejected' && log.isDenied);
                
                const matchesSearch = log.name.toLowerCase().includes(searchTerm) || 
                                     log.verifyId.toLowerCase().includes(searchTerm) || 
                                     log.dateStr.toLowerCase().includes(searchTerm);
                
                return matchesTab && matchesSearch;
            });

            if (filtered.length === 0) {
                list.innerHTML = `<tr><td class="p-8 text-center text-xs text-slate-400 italic">No matching records found.</td></tr>`;
                return;
            }

            list.innerHTML = filtered.map(entry => `
                <tr class="text-xs hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                    <td class="p-3">
                        <p class="font-bold text-slate-700">${entry.name}</p>
                        ${entry.isDenied ? `<p class="text-[9px] text-rose-500 font-medium">Reason: ${entry.message.replace('Denied: ', '')}</p>` : ''}
                    </td>
                    <td class="p-3 font-mono text-[9px] text-slate-400">${entry.verifyId}</td>
                    <td class="p-3">
                        <p class="font-black ${entry.isDenied ? 'text-rose-500' : 'text-emerald-600'}">₹${entry.amount}</p>
                        <span class="text-[7px] px-1.5 py-0.5 rounded font-black uppercase ${entry.isDenied ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-600'}">
                            ${entry.isDenied ? 'Rejected' : 'Verified'}
                        </span>
                    </td>
                    <td class="p-3 text-right text-slate-400 font-medium leading-tight">${entry.dateStr}</td>
                </tr>
            `).join('');
        }

        window.openEditModal = (id, upi, merchant) => {
            currentGymId = id;
            document.getElementById('editUpiId').value = upi;
            document.getElementById('editMerchantName').value = merchant;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.saveChanges = async () => {
            await updateDoc(doc(db, "gyms", currentGymId), {
                upiId: document.getElementById('editUpiId').value,
                merchantName: document.getElementById('editMerchantName').value
            });
            closeModal('editModal');
            loadGyms();
        };

        loadGyms();
    </script>
</body>
</html>
