<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Elevated | Expense Tracker</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0d110f; 
            color: #f1f5f3; 
            min-height: 100vh;
        }

        /* Adherence to [2025-10-02]: 10px radius for inputs/buttons */
        .rounded-gym { border-radius: 10px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .input-standard {
            width: 100%;
            background: #1a1f1c;
            padding: 12px;
            border-radius: 10px; 
            border: 1px solid #2d332f;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .btn-primary {
            background: #22c55e;
            color: #052e16;
            font-weight: 800;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #16a34a; }

        .archive-pill {
            background: #1a1f1c;
            border: 1px solid #2d332f;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s;
            text-align: left;
        }
        .archive-pill.active {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }
    </style>
</head>
<body class="p-6 md:p-10">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div class="flex items-center gap-8">
            <div>
                <h1 id="viewTitle" class="text-3xl font-black tracking-tight text-white">Dashboard</h1>
                <p id="viewSubtitle" class="text-green-500/60 font-bold text-[10px] uppercase tracking-widest mt-1">Expense Management</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='dashboard.html'" class="bg-white/10 hover:bg-white/20 text-white px-5 py-2.5 rounded-gym text-[10px] font-black uppercase tracking-tighter transition-all">
                Dashboard
            </button>
            <button onclick="resetToCurrentMonth()" id="resetBtn" class="hidden bg-green-500 text-green-950 px-5 py-2.5 rounded-gym text-[10px] font-black uppercase tracking-tighter">
                Return to Present
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-8">
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Total Monthly Burn</p>
                <h2 id="totalSpend" class="text-4xl font-black italic text-white">₹0</h2>
            </div>
            <div class="glass-card p-8">
                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Fixed Facility Costs</p>
                <h2 id="fixedTotal" class="text-4xl font-black italic text-white">₹0</h2>
            </div>
            <div class="glass-card p-8 border-l-4 border-l-green-500">
                <p class="text-[10px] font-bold text-green-500/50 uppercase tracking-widest mb-2">Staff Payroll</p>
                <h2 id="staffTotal" class="text-4xl font-black italic text-white">₹0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6">
                    <h3 class="text-[11px] font-black uppercase text-green-500 mb-6 tracking-widest">Log Expense</h3>
                    <div class="space-y-4">
                        <select id="expCategory" class="input-standard font-bold">
                            <option value="Rent">🏢 Rent</option>
                            <option value="Electricity">⚡ Electricity</option>
                            <option value="Maintenance">🛠️ Maintenance</option>
                            <option value="Equipment">🏋️ Equipment</option>
                            <option value="Others">📦 Miscellaneous / Others</option>
                        </select>
                        <input id="expTitle" type="text" placeholder="Description (Optional)" class="input-standard">
                        <input id="expAmount" type="number" placeholder="Amount (₹)" class="input-standard font-black text-green-400">
                        <button onclick="addExpense()" class="btn-primary w-full mt-2">Add Entry</button>
                    </div>
                </div>

                <div class="glass-card p-6">
                    <h3 class="text-[11px] font-black uppercase text-green-500 mb-4 tracking-widest">Quick Payroll</h3>
                    <div id="staffList" class="space-y-3 mb-6 max-h-60 overflow-y-auto no-scrollbar"></div>
                    <div class="pt-4 border-t border-white/5 flex gap-2">
                        <input id="staffName" type="text" placeholder="Staff Name" class="input-standard text-xs">
                        <button onclick="addStaff()" class="bg-white text-black px-4 rounded-gym text-[10px] font-black uppercase">Add</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass-card overflow-hidden">
                    <div class="px-8 py-6 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                        <h3 class="text-[11px] font-black uppercase text-zinc-400 tracking-widest">Monthly Ledger</h3>
                        <span id="ledgerStatus" class="text-[10px] font-bold text-green-500 uppercase">Live Data</span>
                    </div>
                    <div id="expenseList" class="divide-y divide-white/5 max-h-[600px] overflow-y-auto no-scrollbar">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-12 mt-4">
                <h3 class="text-[11px] font-black uppercase text-zinc-500 mb-6 tracking-widest">Historical Data</h3>
                <div id="archiveList" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gymId = localStorage.getItem("activeGymId");

        const getMonthKey = () => new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
        let viewingMonth = getMonthKey();

        window.viewArchive = (monthKey) => {
            viewingMonth = monthKey;
            const current = getMonthKey();
            document.getElementById('resetBtn').classList.toggle('hidden', monthKey === current);
            document.getElementById('ledgerStatus').innerText = monthKey === current ? "Live Data" : "Archive View";
            loadFinancials();
        };

        window.resetToCurrentMonth = () => viewArchive(getMonthKey());

        window.addExpense = async () => {
            const category = document.getElementById('expCategory').value;
            let title = document.getElementById('expTitle').value.trim();
            const amount = parseFloat(document.getElementById('expAmount').value);
            
            if (isNaN(amount)) return;
            
            // If description input is left empty, default to utilizing the category choice
            if (!title) {
                title = `${category} Expense`;
            }

            try {
                await addDoc(collection(db, "expenses"), {
                    gymId, category, title, amount,
                    monthKey: getMonthKey(),
                    timestamp: Date.now()
                });
                document.getElementById('expTitle').value = "";
                document.getElementById('expAmount').value = "";
                loadFinancials();
            } catch (e) { console.error(e); }
        };

        async function loadFinancials() {
            try {
                document.getElementById('viewTitle').innerText = "EXPENSE";
                const q = query(collection(db, "expenses"), where("gymId", "==", gymId));
                const snap = await getDocs(q);
                const activeList = document.getElementById('expenseList');
                const archiveList = document.getElementById('archiveList');
                
                activeList.innerHTML = ""; 
                archiveList.innerHTML = "";
                
                let monthlyTotal = 0, fixedTotal = 0, salaryTotal = 0;
                let archives = {}; 

                snap.forEach(d => {
                    const data = d.data();
                    if (data.monthKey === viewingMonth) {
                        monthlyTotal += data.amount;
                        if (['Rent', 'Electricity'].includes(data.category)) fixedTotal += data.amount;
                        if (data.category === 'Salary') salaryTotal += data.amount;

                        let shortLabel = (data.category || 'EX').substring(0,2);

                        activeList.innerHTML += `
                        <div class="px-8 py-5 flex justify-between items-center hover:bg-white/[0.02] transition-all">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-gym bg-green-500/10 flex items-center justify-center text-[10px] font-black text-green-500 uppercase">
                                    ${shortLabel}
                                </div>
                                <div>
                                    <p class="font-bold text-white text-sm">${data.title}</p>
                                    <p class="text-[9px] text-zinc-500 font-black uppercase tracking-widest">${data.category}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <p class="font-black text-white text-sm">₹${data.amount.toLocaleString()}</p>
                                <button onclick="deleteEntry('${d.id}')" class="text-zinc-600 hover:text-red-500">✕</button>
                            </div>
                        </div>`;
                    }
                    if (!archives[data.monthKey]) archives[data.monthKey] = 0;
                    archives[data.monthKey] += data.amount;
                });

                document.getElementById('totalSpend').innerText = `₹${monthlyTotal.toLocaleString()}`;
                document.getElementById('fixedTotal').innerText = `₹${fixedTotal.toLocaleString()}`;
                document.getElementById('staffTotal').innerText = `₹${salaryTotal.toLocaleString()}`;

                Object.keys(archives).sort().reverse().forEach(month => {
                    const isActive = month === viewingMonth;
                    archiveList.innerHTML += `
                    <button onclick="viewArchive('${month}')" class="archive-pill ${isActive ? 'active' : ''}">
                        <p class="text-[8px] font-black ${isActive ? 'text-green-500' : 'text-zinc-500'} uppercase tracking-widest mb-1">${month}</p>
                        <p class="text-sm font-black text-white">₹${archives[month].toLocaleString()}</p>
                    </button>`;
                });
            } catch (e) { console.error(e); }
        }

        window.addStaff = async () => {
            const name = document.getElementById('staffName').value;
            if (!name) return;
            try {
                await addDoc(collection(db, "staff"), { gymId, name });
                document.getElementById('staffName').value = "";
                loadStaff();
            } catch (e) { console.error(e); }
        };

        window.payStaff = async (staffId, name) => {
            const amountInput = document.getElementById(`pay-amt-${staffId}`);
            const amount = parseFloat(amountInput.value);
            if (isNaN(amount)) return;
            try {
                await addDoc(collection(db, "expenses"), {
                    gymId, category: "Salary", title: `Salary: ${name}`,
                    amount, monthKey: getMonthKey(), timestamp: Date.now()
                });
                loadFinancials();
                amountInput.value = "";
            } catch (e) { console.error(e); }
        };

        async function loadStaff() {
            try {
                const q = query(collection(db, "staff"), where("gymId", "==", gymId));
                const snap = await getDocs(q);
                const list = document.getElementById('staffList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    list.innerHTML += `
                    <div class="p-3 bg-white/[0.03] rounded-gym border border-white/5">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-[10px] font-black text-zinc-300 uppercase tracking-tighter">${s.name}</p>
                            <button onclick="deleteStaff('${d.id}')" class="text-zinc-600 hover:text-red-500 text-[10px]">✕</button>
                        </div>
                        <div class="flex gap-2">
                            <input id="pay-amt-${d.id}" type="number" placeholder="Amt" 
                                class="w-full bg-[#0d110f] border border-white/10 rounded-gym p-2 text-xs font-black text-green-400 outline-none">
                            <button onclick="payStaff('${d.id}', '${s.name}')" 
                                class="bg-green-500 text-green-950 px-4 rounded-gym text-[9px] font-black uppercase">
                                Pay
                            </button>
                        </div>
                    </div>`;
                });
            } catch (e) { console.error(e); }
        }

        window.deleteEntry = async (id) => { if (confirm("Delete entry?")) { await deleteDoc(doc(db, "expenses", id)); loadFinancials(); } };
        window.deleteStaff = async (id) => { if (confirm("Remove staff?")) { await deleteDoc(doc(db, "staff", id)); loadStaff(); } };

        loadFinancials(); 
        loadStaff();
    </script>
</body>
</html>
