<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>GymFlow | Trainer Directory</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0d110f; /* Updated to match GymFlow Dark Theme */
            color: #f1f5f3; 
            min-height: 100vh;
        }
        
        /* Strict Adherence to [2025-10-02]: 10px radius */
        .rounded-gym { border-radius: 10px !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .input-standard {
            width: 100%;
            background: #1a1f1c;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2d332f;
            color: white;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }
        .input-standard:focus { border-color: #22c55e; background: #242a26; }

        .btn-primary {
            background: #22c55e;
            color: #052e16;
            padding: 14px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #16a34a; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: transparent;
            color: white;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 100%;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: #22c55e; }

        .trainer-avatar {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: #22c55e;
            color: #052e16;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-style: italic;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Responsive Header -->
        <header class="flex justify-between items-start mb-12 relative">
            <div class="pr-32 md:pr-0">
                <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter uppercase leading-none text-white">
                    trainers <span class="text-green-500"></span>
                </h1>
                <p class="text-[10px] font-black text-zinc-500 tracking-[0.3em] uppercase mt-2">Staff Access Management Protocol</p>
                
                <div id="trainerCount" class="mt-4 bg-green-500/10 text-green-500 text-[9px] font-black px-3 py-1.5 rounded-gym border border-green-500/20 w-fit">
                    0 ACTIVE TRAINERS
                </div>
            </div>

            <!-- Dashboard Button Pinned Right -->
            <div class="absolute right-0 top-0 md:relative">
                <button onclick="window.location.href='dashboard.html'" 
                        class="bg-[#1c1c1c] text-white px-4 py-2.5 rounded-gym text-[10px] font-black uppercase tracking-widest border border-white/5 shadow-2xl hover:bg-zinc-800 transition-all flex items-center gap-2">
                    DASHBOARD 
                    
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Registration Sidebar -->
            <div class="lg:col-span-4">
                <div class="glass-card p-6 sticky top-10">
                    <h3 class="text-[11px] font-black uppercase text-green-500 mb-6 tracking-widest">Onboard New Trainer</h3>
                    
                    <div class="space-y-5">
                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-zinc-500 uppercase tracking-widest ml-1">Profile Details</label>
                            <input id="trainerName" type="text" placeholder="Full Legal Name" class="input-standard">
                            <input id="trainerSpecialty" type="text" placeholder="Specialty (Yoga, MMA, etc.)" class="input-standard">
                        </div>

                        <div class="space-y-3">
                            <label class="text-[9px] font-black text-zinc-500 uppercase tracking-widest ml-1">Portal Credentials</label>
                            <input id="trainerUser" type="text" placeholder="Assign Username" class="input-standard font-bold text-green-400">
                            <input id="trainerPass" type="password" placeholder="Assign Password" class="input-standard font-bold text-green-400">
                        </div>

                        <button id="regBtn" onclick="addTrainer()" class="btn-primary mt-2 shadow-lg shadow-green-500/20">
                            Register & Grant Access
                        </button>

                        <div class="pt-6 border-t border-white/5">
                            <a href="/trainer/" class="btn-secondary">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                                </svg>
                                Trainer Portal Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Records Main -->
            <div class="lg:col-span-8">
                <div class="glass-card overflow-hidden">
                    <div class="px-8 py-5 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                        <h3 class="text-[11px] font-black uppercase text-zinc-400 tracking-widest">Staff Records</h3>
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-[9px] font-black text-green-500/80 uppercase tracking-widest">Live Database</span>
                        </div>
                    </div>
                    
                    <div id="trainerList" class="divide-y divide-white/5 min-h-[500px]">
                        <!-- Content injected via JS -->
                    </div>

                    <div id="emptyState" class="hidden flex flex-col items-center justify-center py-32 text-center">
                        <div class="w-20 h-20 bg-white/5 rounded-gym flex items-center justify-center mb-6 border border-white/5">
                            <svg class="w-10 h-10 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                        </div>
                        <p class="text-zinc-500 text-sm font-medium italic tracking-wide">No staff found in the directory.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const activeGymId = localStorage.getItem("activeGymId") || localStorage.getItem("gymId");

        if (!activeGymId) window.location.href = "login.html";

        window.addTrainer = async () => {
            const btn = document.getElementById('regBtn');
            const name = document.getElementById('trainerName').value;
            const specialty = document.getElementById('trainerSpecialty').value;
            const user = document.getElementById('trainerUser').value;
            const pass = document.getElementById('trainerPass').value;

            if (!name || !user || !pass) return alert("Please complete all required fields");

            btn.innerText = "VERIFYING ENROLLMENT...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "trainers"), {
                    gymId: activeGymId,
                    name,
                    specialty: specialty || "General Trainer",
                    username: user.toLowerCase().trim(),
                    password: pass,
                    createdAt: Date.now()
                });
                
                ["trainerName", "trainerSpecialty", "trainerUser", "trainerPass"].forEach(id => document.getElementById(id).value = "");
                loadTrainers();
            } catch (e) { 
                alert("Database Error: " + e.message);
            } finally {
                btn.innerText = "REGISTER & GRANT ACCESS";
                btn.disabled = false;
            }
        };

        window.deleteTrainer = async (id) => {
            if (confirm("Permanently revoke access and remove this trainer?")) {
                await deleteDoc(doc(db, "trainers", id));
                loadTrainers();
            }
        };

        async function loadTrainers() {
            try {
                const q = query(collection(db, "trainers"), where("gymId", "==", activeGymId));
                const snap = await getDocs(q);
                const list = document.getElementById('trainerList');
                const empty = document.getElementById('emptyState');
                
                list.innerHTML = "";
                document.getElementById('trainerCount').innerText = `${snap.size} ACTIVE TRAINERS`;

                if (snap.empty) {
                    empty.classList.remove('hidden');
                    return;
                }
                empty.classList.add('hidden');

                snap.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `
                        <div class="px-8 py-6 flex justify-between items-center hover:bg-white/[0.02] transition-colors border-b border-white/[0.03]">
                            <div class="flex items-center gap-5">
                                <div class="trainer-avatar shadow-lg shadow-green-500/10">
                                    ${t.name.charAt(0)}
                                </div>
                                <div>
                                    <h4 class="font-bold text-white text-base leading-tight">${t.name}</h4>
                                    <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5">
                                        <span class="text-[9px] text-green-500 font-black uppercase tracking-widest">${t.specialty}</span>
                                        <span class="hidden md:block text-white/10 text-[8px]">•</span>
                                        <span class="text-[9px] text-zinc-500 font-bold uppercase tracking-tighter">ID: ${t.username}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <button onclick="deleteTrainer('${d.id}')" class="w-10 h-10 rounded-gym border border-white/5 flex items-center justify-center text-zinc-600 hover:text-red-500 hover:bg-red-500/10 transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error("Load error:", e); }
        }

        loadTrainers();
    </script>
</body>
</html>
