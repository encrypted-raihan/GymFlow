<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elevated | Business Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-deep: #0d110f;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.05);
            --brand-green: #22c55e;
            --text-main: #f1f5f3;
            --text-dim: #71717a;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main); 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .rounded-gym { border-radius: 10px; }
        
        .glass-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(34, 197, 94, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-segment { 
            transition: all 0.3s ease; 
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .btn-segment.active { 
            background: rgba(34, 197, 94, 0.1); 
            color: var(--brand-green);
        }

        .chart-container {
            position: relative;
            height: 240px;
            width: 100%;
        }

        #memberTable tr { 
            border-bottom: 1px solid rgba(255, 255, 255, 0.04); 
            transition: background 0.2s;
        }
        #memberTable tr:last-child { border-bottom: none; }
        #memberTable tr:hover { background: rgba(255, 255, 255, 0.02); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-entry { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="p-6 md:p-10 lg:p-16">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-6 animate-entry">
            <div>
                <h1 class="text-5xl font-black tracking-tighter italic text-white leading-none">
                    Insights <span class="text-green-500">.</span>
                </h1>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mt-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    Operational Period: <span id="monthDisplay" class="text-white">...</span>
                </p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dashboard.html'" class="bg-white/5 hover:bg-white/10 text-white px-8 py-4 rounded-gym text-[11px] font-black uppercase tracking-widest transition-all border border-white/5">
                    Dashboard
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-12 animate-entry" style="animation-delay: 0.1s;">
            <div class="glass-card p-8 border-l-4 border-red-500/50">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.15em] mb-4">Unpaid Dues</p>
                <div class="flex items-baseline gap-2">
                    <h3 class="text-4xl font-black text-white italic" id="kpi-due-count">0</h3>
                    <span class="text-red-500 text-[10px] font-bold">Action Req.</span>
                </div>
            </div>
            <div class="glass-card p-8 border-l-4 border-green-500/50">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.15em] mb-4">Paid (Current)</p>
                <div class="flex items-baseline gap-2">
                    <h3 class="text-4xl font-black text-white italic" id="kpi-paid-count">0</h3>
                    <span class="text-green-500 text-[10px] font-bold">Stable</span>
                </div>
            </div>
            <div class="glass-card p-8 border-l-4 border-blue-500/50">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.15em] mb-4">MRR Projection</p>
                <div class="flex items-baseline gap-2">
                    <h3 class="text-4xl font-black text-white italic" id="kpi-revenue">₹0</h3>
                </div>
            </div>
            <div class="glass-card p-8 border-l-4 border-zinc-700">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.15em] mb-4">Paused / Inactive</p>
                <div class="flex items-baseline gap-2">
                    <h3 class="text-4xl font-black text-white italic" id="kpi-paused">0</h3>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12 animate-entry" style="animation-delay: 0.2s;">
            <div class="glass-card p-10">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h4 class="text-[11px] font-black text-white uppercase tracking-widest">Revenue Pipeline</h4>
                        <p class="text-[10px] text-zinc-500 mt-1 font-bold">Payment Collection Ratio</p>
                    </div>
                </div>
                <div class="chart-container"><canvas id="collectionChart"></canvas></div>
            </div>
            <div class="glass-card p-10">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h4 class="text-[11px] font-black text-white uppercase tracking-widest">Growth Dynamics</h4>
                        <p class="text-[10px] text-zinc-500 mt-1 font-bold">Retention vs Churn</p>
                    </div>
                </div>
                <div class="chart-container"><canvas id="statusChart"></canvas></div>
            </div>
        </section>

        <section class="animate-entry" style="animation-delay: 0.3s;">
            <div class="glass-card overflow-hidden w-full">
                <div class="px-10 py-8 border-b border-white/5 flex flex-col sm:flex-row justify-between items-center gap-6">
                    <div>
                        <h4 class="font-black uppercase text-[12px] text-white tracking-widest italic">Member Segments</h4>
                        <p class="text-[10px] text-zinc-500 font-bold uppercase mt-1">Real-time DB Sync</p>
                    </div>
                    <div class="flex bg-white/5 p-1.5 rounded-gym border border-white/5">
                        <button onclick="applyFilter('due')" id="f-due" class="btn-segment active">Pending</button>
                        <button onclick="applyFilter('paid')" id="f-paid" class="btn-segment">Settled</button>
                        <button onclick="applyFilter('inactive')" id="f-inactive" class="btn-segment">Inactive</button>
                    </div>
                </div>

                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left">
                        <thead class="text-[10px] font-black text-zinc-600 uppercase tracking-widest bg-white/[0.01]">
                            <tr>
                                <th class="px-10 py-6">Member Profile</th>
                                <th class="px-10 py-6">Status Info</th>
                                <th class="px-10 py-6 text-right">Plan Rate</th>
                            </tr>
                        </thead>
                        <tbody id="memberTable" class="text-zinc-300">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gymId = localStorage.getItem('activeGymId');

        let members = [];
        let filteredMembers = [];
        let activeCharts = { collection: null, status: null };

        const now = new Date();
        const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        async function initializeTerminal() {
            if (!gymId) return;
            document.getElementById('monthDisplay').innerText = now.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            try {
                const q = query(collection(db, "members"), where("gymId", "==", gymId));
                onSnapshot(q, (snapshot) => {
                    members = snapshot.docs.map(doc => {
                        const data = doc.data();
                        const isPaid = (data.payments || []).includes(currentMonth);
                        const isPaused = data.status === 'inactive';
                        
                        let category = "due";
                        if (isPaused) category = "inactive";
                        else if (isPaid) category = "paid";

                        return { ...data, id: doc.id, category: category };
                    });
                    refreshUI();
                });
            } catch (error) {
                console.error(error);
            }
        }

        function refreshUI() {
            updateKPIs();
            renderAnalyticsCharts();
            applyFilter('due');
        }

        function updateKPIs() {
            const stats = {
                due: members.filter(m => m.category === 'due').length,
                paid: members.filter(m => m.category === 'paid').length,
                inactive: members.filter(m => m.category === 'inactive').length,
                totalRev: members.reduce((acc, m) => acc + (parseFloat(m.monthlyFee) || 0), 0)
            };

            document.getElementById('kpi-due-count').innerText = stats.due;
            document.getElementById('kpi-paid-count').innerText = stats.paid;
            document.getElementById('kpi-paused').innerText = stats.inactive;
            document.getElementById('kpi-revenue').innerText = `₹${stats.totalRev.toLocaleString()}`;
        }

        function renderAnalyticsCharts() {
            const dueCount = members.filter(m => m.category === 'due').length;
            const paidCount = members.filter(m => m.category === 'paid').length;
            const inactiveCount = members.filter(m => m.category === 'inactive').length;
            const activeCount = members.length - inactiveCount;

            if (activeCharts.collection) activeCharts.collection.destroy();
            if (activeCharts.status) activeCharts.status.destroy();

            const ctx1 = document.getElementById('collectionChart').getContext('2d');
            activeCharts.collection = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Collected', 'Pending'],
                    datasets: [{
                        data: [paidCount, dueCount],
                        backgroundColor: ['#22c55e', '#ef4444'],
                        borderColor: 'transparent',
                        cutout: '85%'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const ctx2 = document.getElementById('statusChart').getContext('2d');
            activeCharts.status = new Chart(ctx2, {
                type: 'pie',
                data: {
                    labels: ['Active Members', 'Paused Plans'],
                    datasets: [{
                        data: [activeCount, inactiveCount],
                        backgroundColor: ['#22c55e', '#ef4444'],
                        borderColor: '#0d110f',
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        window.applyFilter = (type) => {
            document.querySelectorAll('.btn-segment').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`f-${type}`);
            if(activeBtn) activeBtn.classList.add('active');
            
            filteredMembers = members.filter(m => m.category === type);
            renderMemberTable();
        };

        function renderMemberTable() {
            const tbody = document.getElementById('memberTable');
            if (filteredMembers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="py-20 text-center"><p class="text-[10px] font-black text-zinc-700 uppercase tracking-widest italic">No Data in Segment</p></td></tr>`;
                return;
            }

            tbody.innerHTML = filteredMembers.map(m => `
                <tr class="group">
                    <td class="px-10 py-6">
                        <div class="flex flex-col">
                            <span class="text-sm font-black italic tracking-tight text-white">${m.name}</span>
                            <span class="text-[10px] font-bold text-zinc-600">${m.phone}</span>
                        </div>
                    </td>
                    <td class="px-10 py-6">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black uppercase text-zinc-500 tracking-tighter">Plan Type</span>
                            <span class="text-[11px] font-bold text-white">${m.plan || 'Standard'}</span>
                        </div>
                    </td>
                    <td class="px-10 py-6 text-right font-bold text-zinc-400">
                        ₹${m.monthlyFee || 0}
                    </td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', initializeTerminal);
    </script>
</body>
</html>
