<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elevated | Revenue Audit & Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-deep: #0a0c0b;
            --brand-green: #22c55e;
            --brand-red: #ef4444;
            --glass-white: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-deep); 
            color: #f1f5f3; 
            letter-spacing: -0.02em;
            min-height: 100vh;
        }

        /* UI Consistency (Saved Preference: 10px Radius) */
        .rounded-gym { border-radius: 10px !important; }
        
        .glass-panel {
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        @media (min-width: 768px) {
            .glass-panel { border-radius: 30px; }
        }

        .nav-tab {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #52525b;
            transition: all 0.2s ease;
            padding: 10px 16px;
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .nav-tab { font-size: 11px; padding: 12px 24px; }
        }

        .nav-tab.active {
            color: var(--brand-green);
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        input {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 10px !important;
            color: white !important;
            outline: none !important;
        }

        input:focus { border-color: var(--brand-green) !important; }

.btn-dash {
    background: #1c1c1c; /* Deep charcoal matching the image */
    color: #ffffff;      /* Pure white text */
    font-weight: 900;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid rgba(255, 255, 255, 0.05); /* Very subtle border for depth */
    transition: all 0.2s ease;
}


        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--brand-green); border-radius: 10px; }

        .verify-badge {
            font-family: monospace;
            font-size: 9px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--brand-green);
            padding: 2px 6px;
            border-radius: 5px;
        }

        .animate-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="p-4 md:p-16 lg:px-32">

    <div class="max-w-7xl mx-auto relative">
<!-- TOP NAVIGATION BAR -->
<nav class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 md:mb-12 gap-6 relative">
    
    <!-- Title Section -->
    <div class="flex flex-col">
        <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter uppercase leading-none">
        Payment<span class="text-green-500"></span>
        </h1>
        <p class="text-[9px] font-black text-zinc-600 tracking-[0.3em] uppercase mt-2">Admin Audit Protocol</p>
    </div>

    <!-- Actions Container: Pushes Tabs and Button to the right on Laptop -->
    <div class="w-full md:w-auto flex flex-col md:flex-row items-end md:items-center gap-4">
        
        <!-- Tabs -->
        <div class="flex bg-white/5 p-1 rounded-gym border border-white/5 overflow-x-auto no-scrollbar w-full md:w-auto">
            <button onclick="showSection('pending')" id="tab-pending" class="nav-tab active rounded-gym flex-1">Pending</button>
            <button onclick="showSection('history')" id="tab-history" class="nav-tab rounded-gym flex-1">History</button>
            <button onclick="showSection('denied')" id="tab-denied" class="nav-tab rounded-gym flex-1">Denied</button>
        </div>

        <!-- DASHBOARD BUTTON: Absolute top-right on Mobile, Flowing on Laptop -->
        <div class="absolute right-0 top-0 md:relative md:top-auto md:right-auto">
            <button onclick="window.location.href='dashboard.html'" 
                    class="btn-dash px-3 py-1.5 md:px-4 md:py-2 rounded-gym flex items-center gap-2 shadow-xl border border-white/10">
                <span class="text-[9px] md:text-[10px]">DASHBOARD</span>
                
            </button>
        </div>
    </div>
</nav>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            
            <div class="lg:col-span-4 space-y-4 md:space-y-6">
                <div class="glass-panel p-6 md:p-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-green-500"></div>
                    <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-1">Audit Control</p>
                    <h2 class="text-2xl md:text-3xl font-black italic text-white uppercase">Filter Ledger</h2>
                    <div class="mt-6">
                        <input type="text" id="adminLogSearch" oninput="filterAllLogs()" placeholder="SEARCH LOGS..." 
                               class="w-full px-4 py-3.5 text-[10px] font-black tracking-widest uppercase">
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <section id="pending-section" class="space-y-4 animate-in">
                    <h3 class="text-[10px] font-black text-zinc-600 uppercase tracking-widest italic px-1">Awaiting Verification</h3>
                    <div id="pendingList" class="grid grid-cols-1 gap-3 md:gap-4"></div>
                </section>

                <section id="history-section" class="hidden animate-in">
                    <div class="glass-panel overflow-hidden">
                        <div class="max-h-[500px] md:max-h-[600px] overflow-y-auto custom-scroll table-container">
                            <table class="w-full text-left border-collapse">
                                <thead class="sticky top-0 bg-[#0d0f0e] border-b border-white/5 z-10">
                                    <tr class="text-[8px] md:text-[9px] font-black text-zinc-600 uppercase tracking-widest">
                                        <th class="px-4 md:px-8 py-4 md:py-6">Identity</th>
                                        <th class="px-4 md:px-8 py-4 md:py-6 hidden sm:table-cell">Verify ID</th>
                                        <th class="px-4 md:px-8 py-4 md:py-6">Amount</th>
                                        <th class="px-4 md:px-8 py-4 md:py-6 text-right">Settled</th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody" class="divide-y divide-white/[0.02]"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="denied-section" class="hidden space-y-4 animate-in">
                    <h3 class="text-[10px] font-black text-red-500 uppercase tracking-widest italic px-1">Rejected History</h3>
                    <div id="deniedList" class="grid grid-cols-1 gap-3"></div>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, collection, query, where, onSnapshot, 
            doc, updateDoc, arrayUnion 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_GYM_ID = localStorage.getItem('adminGymId');

        let rawPending = [];
        let rawHistory = [];
        let rawDenied = [];

        const formatTime = (ts) => ts ? new Date(ts).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) : '---';
        const getMonthName = (ts) => ts ? new Date(ts).toLocaleString('default', { month: 'short' }) : '---';

        onSnapshot(query(collection(db, "members"), where("gymId", "==", ADMIN_GYM_ID), where("paymentStatus", "==", "verifying")), (snapshot) => {
            rawPending = snapshot.docs.map(mDoc => {
                const data = mDoc.data();
                const verifyId = `${data.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`;
                return { id: mDoc.id, verifyId, ...data };
            });
            renderPending();
        });

        onSnapshot(query(collection(db, "members"), where("gymId", "==", ADMIN_GYM_ID), where("paymentStatus", "==", "paid")), (snapshot) => {
            rawHistory = snapshot.docs.map(mDoc => {
                const data = mDoc.data();
                const verifyId = `${data.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`;
                return { id: mDoc.id, verifyId, ...data };
            });
            renderHistory();
        });

        onSnapshot(query(collection(db, "members"), where("gymId", "==", ADMIN_GYM_ID)), (snapshot) => {
            rawDenied = [];
            snapshot.forEach((mDoc) => {
                const data = mDoc.data();
                if (data.paymentLogs && Array.isArray(data.paymentLogs)) {
                    data.paymentLogs.filter(l => l.type === 'Denied').forEach(log => {
                        rawDenied.push({
                            name: data.name,
                            message: log.message,
                            date: log.date,
                            verifyId: `${data.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`
                        });
                    });
                }
            });
            rawDenied.sort((a, b) => b.date - a.date);
            renderDenied();
        });

        function renderPending(term = '') {
            const list = document.getElementById('pendingList');
            const filtered = rawPending.filter(i => i.name.toLowerCase().includes(term.toLowerCase()) || i.verifyId.toLowerCase().includes(term.toLowerCase()));
            list.innerHTML = filtered.map(m => `
                <div class="glass-panel p-5 md:p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 group transition-all">
                    <div class="flex items-center gap-4 md:gap-6">
                        <div class="w-10 h-10 md:w-12 md:h-12 bg-white/5 rounded-gym flex items-center justify-center font-black text-green-500 italic text-sm">GF</div>
                        <div>
                            <p class="text-lg md:text-xl font-black italic uppercase leading-tight">${m.name}</p>
                            <span class="verify-badge">${m.verifyId}</span>
                        </div>
                    </div>
                    <div class="flex flex-row items-center justify-between md:justify-end gap-4 md:gap-8 w-full md:w-auto pt-2 md:pt-0 border-t border-white/5 md:border-none">
                        <div>
                            <p class="text-xl md:text-2xl font-black italic text-white leading-none">₹${m.monthlyFee}</p>
                            <p class="text-[7px] font-bold text-zinc-600 tracking-tighter mt-1 uppercase">Billing Request</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="approvePayment('${m.id}')" class="bg-green-500 text-black px-4 py-3 rounded-gym text-[9px] font-black uppercase">Approve</button>
                            <button onclick="denyPayment('${m.id}')" class="bg-white/5 text-zinc-500 px-4 py-3 rounded-gym text-[9px] font-black uppercase border border-white/5">Deny</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-20 text-zinc-800 font-black italic">NO_PENDING_ASSETS</div>';
        }

        function renderHistory(term = '') {
            const tbody = document.getElementById('historyTableBody');
            const filtered = rawHistory.filter(i => i.name.toLowerCase().includes(term.toLowerCase()) || i.verifyId.toLowerCase().includes(term.toLowerCase()));
            tbody.innerHTML = filtered.map(m => `
                <tr class="hover:bg-white/[0.01] transition-colors">
                    <td class="px-4 md:px-8 py-4">
                        <p class="font-black italic text-[10px] md:text-xs uppercase leading-tight">${m.name}</p>
                        <p class="text-[7px] text-zinc-600 mt-0.5 uppercase sm:hidden">${m.verifyId}</p>
                    </td>
                    <td class="px-4 md:px-8 py-4 font-mono text-[9px] text-zinc-500 hidden sm:table-cell">${m.verifyId}</td>
                    <td class="px-4 md:px-8 py-4">
                        <p class="font-black text-green-500 text-[10px] md:text-xs italic">₹${m.monthlyFee}</p>
                        <p class="text-[7px] text-zinc-600 uppercase font-bold">${getMonthName(m.lastPaymentDate)}</p>
                    </td>
                    <td class="px-4 md:px-8 py-4 text-right font-bold text-zinc-600 text-[8px] md:text-[10px] uppercase">${formatTime(m.lastPaymentDate)}</td>
                </tr>
            `).join('');
        }

        function renderDenied(term = '') {
            const list = document.getElementById('deniedList');
            const filtered = rawDenied.filter(i => i.name.toLowerCase().includes(term.toLowerCase()) || i.verifyId.toLowerCase().includes(term.toLowerCase()));
            list.innerHTML = filtered.map(l => `
                <div class="glass-panel p-5 border-l-2 border-l-red-500/50 flex justify-between items-center gap-4">
                    <div class="min-w-0">
                        <p class="font-black italic text-white uppercase text-xs truncate">${l.name}</p>
                        <p class="text-[9px] text-red-500/80 font-bold mt-1 leading-tight">${l.message}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="text-[8px] font-black text-zinc-700 uppercase">${formatTime(l.date)}</p>
                        <p class="text-[8px] font-mono text-zinc-500 mt-1">${l.verifyId}</p>
                    </div>
                </div>
            `).join('') || '<div class="text-center py-20 text-zinc-800 font-black italic">EMPTY_LOGS</div>';
        }

        window.approvePayment = async (id) => {
            if (!confirm("Verify and Approve?")) return;
            const ts = Date.now();
            const now = new Date();
            const curCode = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}`;
            try {
                await updateDoc(doc(db, "members", id), {
                    paymentStatus: 'paid', lastPaymentDate: ts,
                    lastAction: "Payment Approved", lastActionDate: ts,
                    paymentLogs: arrayUnion({ type: 'Approved', message: 'Payment verified', date: ts }),
                    payments: arrayUnion(curCode)
                });
            } catch (e) { console.error(e); }
        };

        window.denyPayment = async (id) => {
            const reason = prompt("Reason for Denial:");
            if (reason === null) return;
            const ts = Date.now();
            const fullReason = `Denied: ${reason || "Verification Failed"}`;
            try {
                await updateDoc(doc(db, "members", id), {
                    paymentStatus: 'unpaid', lastAction: fullReason,
                    lastActionDate: ts, paymentLogs: arrayUnion({ type: 'Denied', message: fullReason, date: ts })
                });
            } catch (e) { console.error(e); }
        };

        window.showSection = (type) => {
            ['pending', 'history', 'denied'].forEach(s => {
                document.getElementById(`${s}-section`).classList.toggle('hidden', s !== type);
                document.getElementById(`tab-${s}`).classList.toggle('active', s === type);
            });
        };

        window.filterAllLogs = () => {
            const term = document.getElementById('adminLogSearch').value;
            renderPending(term); renderHistory(term); renderDenied(term);
        };
    </script>
</body>
</html>
