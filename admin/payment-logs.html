<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Payment Logs | Admin Portal</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .saas-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; }
        /* Custom Tab Active Style */
        .tab-active { background: #0f172a !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="window.location.href='dashboard.html'" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                BACK TO HOME
            </button>
            <div class="text-right">
                <h1 class="text-xl font-black text-slate-900 tracking-tight">Express <span class="text-emerald-600">Checkout</span></h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Admin Control Center</p>
            </div>
        </div>

        <header class="mb-8 space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 leading-tight">Revenue Logs</h2>
                    <p class="text-sm text-slate-500 font-medium">Verify pending transactions and track monthly collections</p>
                </div>
                <div class="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                    <button onclick="showSection('pending')" id="tab-pending" class="px-5 py-2.5 rounded-lg text-xs font-bold tab-active transition-all">Pending</button>
                    <button onclick="showSection('history')" id="tab-history" class="px-5 py-2.5 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all">Paid History</button>
                    <button onclick="showSection('denied')" id="tab-denied" class="px-5 py-2.5 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all">Rejected</button>
                </div>
            </div>

            <div class="relative max-w-md">
                <input type="text" id="adminLogSearch" oninput="filterAllLogs()" placeholder="Search by name or verification ID..." 
                    class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-xs font-semibold outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all shadow-sm">
                <svg class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </header>

        <div id="pending-section" class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Awaiting Verification</h3>
            <div id="pendingList" class="grid gap-3"></div>
        </div>

        <div id="history-section" class="hidden space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Transaction Records</h3>
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 border-b">
                        <tr>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Member</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Verification ID</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Billing Period</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Amount Paid</th>
                            <th class="p-4 text-[10px] font-black text-slate-400 uppercase text-right">Approval Time</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="denied-section" class="hidden space-y-4">
            <h3 class="text-[10px] font-black text-rose-400 uppercase tracking-widest">Rejected History</h3>
            <div id="deniedList" class="grid gap-3"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
        authDomain: "gym-membership-tracker-60626.firebaseapp.com",
        projectId: "gym-membership-tracker-60626",
        storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
        messagingSenderId: "260703319955",
        appId: "1:260703319955:web:78206334baa1fc79725a66"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ADMIN_GYM_ID = localStorage.getItem('adminGymId'); 

    // Local Data Stores for Filtering
    let rawPending = [];
    let rawHistory = [];
    let rawDenied = [];

    const formatTime = (ts) => ts ? new Date(ts).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : '---';
    const getMonthName = (ts) => ts ? new Date(ts).toLocaleString('default', { month: 'long' }) : '---';

    // Global Filter Function
    window.filterAllLogs = () => {
        const term = document.getElementById('adminLogSearch').value.toLowerCase();
        renderPending(term);
        renderHistory(term);
        renderDenied(term);
    };

    // --- 1. PENDING LOGIC ---
    onSnapshot(query(collection(db, "members"), where("gymId", "==", ADMIN_GYM_ID), where("paymentStatus", "==", "verifying")), (snapshot) => {
        rawPending = [];
        snapshot.forEach(mDoc => {
            const data = mDoc.data();
            const verifyId = `${data.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`;
            rawPending.push({ id: mDoc.id, verifyId, ...data });
        });
        renderPending();
    });

    function renderPending(term = '') {
        const list = document.getElementById('pendingList');
        const filtered = rawPending.filter(item => 
            item.name.toLowerCase().includes(term) || item.verifyId.toLowerCase().includes(term)
        );

        list.innerHTML = filtered.length === 0 ? '<p class="text-slate-400 text-xs italic p-12 text-center bg-white rounded-2xl border border-dashed border-slate-200">No matching requests.</p>' : '';
        
        filtered.forEach((data) => {
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm hover:border-emerald-200 transition-all";
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-xs font-black text-slate-400">${data.name.charAt(0)}</div>
                    <div>
                        <p class="font-bold text-slate-800">${data.name}</p>
                        <p class="text-[10px] font-mono font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded inline-block">VERIFY ID: ${data.verifyId}</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right mr-4">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter leading-none">Requested</p>
                        <span class="font-black text-slate-900 text-lg">₹${data.monthlyFee}</span>
                    </div>
                    <button onclick="approvePayment('${data.id}')" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-emerald-100 hover:bg-emerald-700 active:scale-95 transition-all">Approve</button>
                    <button onclick="denyPayment('${data.id}')" class="bg-rose-50 text-rose-600 border border-rose-100 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase hover:bg-rose-100 active:scale-95 transition-all">Deny</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // --- 2. PAID HISTORY LOGIC ---
    onSnapshot(query(collection(db, "members"), where("gymId", "==", ADMIN_GYM_ID), where("paymentStatus", "==", "paid")), (snapshot) => {
        rawHistory = [];
        snapshot.forEach(mDoc => {
            const data = mDoc.data();
            const verifyId = `${data.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`;
            rawHistory.push({ id: mDoc.id, verifyId, ...data });
        });
        renderHistory();
    });

    function renderHistory(term = '') {
        const tbody = document.getElementById('historyTableBody');
        const filtered = rawHistory.filter(item => 
            item.name.toLowerCase().includes(term) || item.verifyId.toLowerCase().includes(term)
        );

        tbody.innerHTML = '';
        filtered.forEach((data) => {
            const tr = document.createElement('tr');
            tr.className = "border-b border-slate-50 hover:bg-slate-50 transition-colors";
            tr.innerHTML = `
                <td class="p-4">
                    <p class="text-sm font-bold text-slate-800 leading-none">${data.name}</p>
                    <p class="text-[9px] text-slate-400 font-medium mt-1">Ref ID: ...${data.id.slice(-6)}</p>
                </td>
                <td class="p-4"><span class="text-[10px] font-mono font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">${data.verifyId}</span></td>
                <td class="p-4"><span class="text-xs font-bold text-slate-600">${getMonthName(data.lastPaymentDate)} 2026</span></td>
                <td class="p-4"><span class="text-sm font-black text-emerald-600">₹${data.monthlyFee}</span></td>
                <td class="p-4 text-right"><p class="text-[11px] text-slate-500 font-bold tracking-tight">${formatTime(data.lastPaymentDate)}</p></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 3. DENIED HISTORY LOGIC ---
    onSnapshot(query(collection(db, "members"), where("gymId", "==", ADMIN_GYM_ID)), (snapshot) => {
        rawDenied = [];
        snapshot.forEach((mDoc) => {
            const data = mDoc.data();
            if (data.paymentLogs && Array.isArray(data.paymentLogs)) {
                data.paymentLogs.forEach(log => {
                    if (log.type === 'Denied') {
                        rawDenied.push({
                            name: data.name,
                            message: log.message,
                            date: log.date,
                            verifyId: `${data.name.split(' ')[0].toUpperCase()}_${mDoc.id.slice(-4)}`
                        });
                    }
                });
            }
        });
        rawDenied.sort((a, b) => b.date - a.date);
        renderDenied();
    });

    function renderDenied(term = '') {
        const list = document.getElementById('deniedList');
        const filtered = rawDenied.filter(item => 
            item.name.toLowerCase().includes(term) || item.verifyId.toLowerCase().includes(term)
        );

        list.innerHTML = filtered.length === 0 ? '<p class="text-slate-400 text-xs italic p-8 text-center bg-white rounded-xl border border-dashed border-slate-200">No records found.</p>' : '';
        
        filtered.forEach(denial => {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl border border-rose-100 border-l-4 border-l-rose-500 flex justify-between items-center shadow-sm mb-2";
            div.innerHTML = `
                <div class="flex items-center gap-4">
                     <div class="w-8 h-8 bg-rose-50 text-rose-400 rounded-full flex items-center justify-center font-bold text-xs">!</div>
                     <div>
                        <p class="font-bold text-slate-800 text-sm">${denial.name}</p>
                        <p class="text-[11px] text-rose-600 font-medium">${denial.message}</p>
                     </div>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-mono font-bold text-slate-400 mb-1">${denial.verifyId}</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">${formatTime(denial.date)}</p>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // ACTIONS
    window.approvePayment = async (id) => {
        if(!confirm("Verify and Approve?")) return;
        const ts = Date.now();
        try {
            await updateDoc(doc(db, "members", id), {
                paymentStatus: 'paid',
                lastPaymentDate: ts,
                lastAction: "Payment Approved",
                lastActionDate: ts,
                paymentLogs: arrayUnion({ type: 'Approved', message: 'Payment verified', date: ts })
            });
        } catch (e) { alert("Error approving payment."); }
    };

    window.denyPayment = async (id) => {
        const reason = prompt("Reason for Denial:");
        if (reason === null) return;
        const ts = Date.now();
        const fullReason = `Denied: ${reason || "Verification Failed"}`;
        try {
            await updateDoc(doc(db, "members", id), {
                paymentStatus: 'unpaid',
                lastAction: fullReason,
                lastActionDate: ts,
                paymentLogs: arrayUnion({ type: 'Denied', message: fullReason, date: ts })
            });
        } catch (e) { alert("Error denying payment."); }
    };

    window.showSection = (type) => {
        ['pending', 'history', 'denied'].forEach(s => {
            const section = document.getElementById(`${s}-section`);
            const btn = document.getElementById(`tab-${s}`);
            if (type === s) {
                section.classList.remove('hidden');
                btn.className = "px-5 py-2.5 rounded-lg text-xs font-bold tab-active transition-all";
            } else {
                section.classList.add('hidden');
                btn.className = "px-5 py-2.5 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all";
            }
        });
    };
</script>
</body>
</html>
