<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymFlow | Revenue Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0d110f; 
            color: #f1f5f3; 
            min-height: 100vh;
        }

        /* UI Consistency: 10px radius for inputs/buttons */
        .rounded-gym { border-radius: 10px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px; /* Bento box style */
            backdrop-filter: blur(10px);
        }

        .action-btn {
            background: #22c55e;
            color: #052e16;
            font-weight: 800;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #16a34a; }

        .chart-wrapper {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* Consistent Table Styling for Dark UI */
        #financeTableBody tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        #financeTableBody tr:hover { background: rgba(255, 255, 255, 0.02); }
    </style>
</head>
<body class="p-6 lg:p-14">

    <main class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic text-white">Revenue <span class="text-green-500">Center</span></h1>
                <p class="text-green-500/60 text-[10px] font-bold uppercase tracking-widest mt-1">Financial Oversight & Profitability</p>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.href='dashboard.html'" class="bg-white/5 hover:bg-white/10 text-white px-6 py-3 rounded-gym text-[10px] font-black uppercase tracking-widest transition-all">
                    Dashboard
                </button>
                <button onclick="window.downloadFullReport()" class="action-btn">
                    Export Full Report
                </button>
            </div>
        </div>

        <!-- Bento Grid Layout -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
            <!-- Main Chart -->
            <div class="glass-card p-8 md:col-span-8 flex flex-col">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="font-black text-lg text-white">Earnings Overview</h3>
                        <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Income vs Expenses </p>
                    </div>
                    <div class="flex gap-4">
                        <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500"></div><span class="text-[8px] font-black uppercase text-zinc-400">Income</span></div>
                        <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-zinc-700"></div><span class="text-[8px] font-black uppercase text-zinc-400">Expense</span></div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>

            <!-- Profit Gauge -->
            <div class="glass-card p-8 md:col-span-4 flex flex-col items-center justify-center text-center">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-6">Profitability Margin</p>
                <div class="relative w-48 h-48">
                    <canvas id="profitGauge"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <h2 id="marginText" class="text-3xl font-black italic text-white">0%</h2>
                        <p id="marginStatus" class="text-[8px] font-bold text-green-500 uppercase">Steady</p>
                    </div>
                </div>
                <div class="mt-8 w-full grid grid-cols-2 border-t border-white/5 pt-6">
                    <div>
                        <p class="text-[8px] font-black text-zinc-500 uppercase mb-1">Net Profit</p>
                        <p id="netProfit" class="text-xl font-black text-green-400 italic">₹0</p>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-zinc-500 uppercase mb-1">Status</p>
                        <p class="text-[10px] font-black text-green-500 uppercase">Operational</p>
                    </div>
                </div>
            </div>

            <!-- Summary Stats -->
            <div class="glass-card p-8 md:col-span-4 flex justify-between items-center bg-green-500 text-green-950 border-none shadow-2xl">
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest mb-1 opacity-70">Gross Income</p>
                    <h2 id="totalIncome" class="text-3xl font-black tracking-tighter italic">₹0</h2>
                </div>
                <div class="bg-white/20 p-3 rounded-gym">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
            </div>

            <div class="glass-card p-8 md:col-span-4 flex justify-between items-center border-l-4 border-l-red-500">
                <div>
                    <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Total Expenses</p>
                    <h2 id="totalExpense" class="text-3xl font-black text-white tracking-tighter italic">₹0</h2>
                </div>
                <div class="bg-red-500/10 p-3 rounded-gym text-red-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>

            <div class="glass-card p-8 md:col-span-4 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Active Members</p>
                    <h2 id="activeCount" class="text-3xl font-black text-white tracking-tighter italic">0</h2>
                </div>
                <div class="bg-white/5 p-3 rounded-gym text-zinc-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
            </div>
        </div>

        <!-- Statements Table -->
        <div class="glass-card overflow-hidden mt-8">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                <h3 class="font-black text-sm uppercase tracking-widest text-zinc-500">Monthly Statements</h3>
            </div>
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">
                            <th class="p-8">Month</th>
                            <th class="p-8">Income</th>
                            <th class="p-8">Expense</th>
                            <th class="p-8">Net Profit</th>
                            <th class="p-8 text-right">Statement</th>
                        </tr>
                    </thead>
                    <tbody id="financeTableBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gymId = localStorage.getItem("activeGymId");
        
        let revenueChart, profitGauge;
        let globalMonthlyData = {};

        async function init() {
            if (!gymId) return;
            const qMembers = query(collection(db, "members"), where("gymId", "==", gymId));
            const qExpenses = query(collection(db, "expenses"), where("gymId", "==", gymId));

            onSnapshot(qMembers, (memSnap) => {
                onSnapshot(qExpenses, (expSnap) => {
                    const members = memSnap.docs.map(d => d.data());
                    const expenses = expSnap.docs.map(d => d.data());
                    document.getElementById('activeCount').innerText = members.length;
                    processData(members, expenses);
                });
            });
        }

        function processData(members, expenses) {
            const data = {};
            members.forEach(m => {
                const monthlyFee = parseFloat(m.monthlyFee) || 0;
                const joiningFee = parseFloat(m.joiningFee) || 0;
                const joinMonth = m.joinDate ? m.joinDate.slice(0, 7) : new Date().toISOString().slice(0, 7);
                if(!data[joinMonth]) data[joinMonth] = { income: 0, expense: 0 };
                data[joinMonth].income += joiningFee;
                (m.payments || []).forEach(code => {
                    if(!data[code]) data[code] = { income: 0, expense: 0 };
                    data[code].income += monthlyFee;
                });
            });
            expenses.forEach(e => {
                const monthCode = e.date ? e.date.slice(0, 7) : new Date().toISOString().slice(0, 7);
                if(!data[monthCode]) data[monthCode] = { income: 0, expense: 0 };
                data[monthCode].expense += parseFloat(e.amount) || 0;
            });
            globalMonthlyData = data;
            renderUI(data);
        }

        function renderUI(data) {
            const sortedMonths = Object.keys(data).sort().reverse();
            let totalIn = 0, totalEx = 0;
            const tbody = document.getElementById('financeTableBody');
            
            tbody.innerHTML = sortedMonths.map(code => {
                const d = data[code];
                const profit = d.income - d.expense;
                totalIn += d.income; totalEx += d.expense;
                return `
                <tr class="group transition-all font-bold text-white">
                    <td class="p-8">${formatMonth(code)}</td>
                    <td class="p-8 text-green-400">₹${d.income.toLocaleString()}</td>
                    <td class="p-8 text-zinc-500">₹${d.expense.toLocaleString()}</td>
                    <td class="p-8">
                        <span class="px-3 py-1 rounded-gym text-[9px] font-black uppercase ${profit >= 0 ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-500'}">
                            ₹${profit.toLocaleString()}
                        </span>
                    </td>
                    <td class="p-8 text-right">
                        <button onclick="window.downloadMonthPDF('${code}')" class="text-[9px] font-black text-zinc-500 hover:text-green-500 uppercase tracking-widest">View PDF</button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('totalIncome').innerText = `₹${totalIn.toLocaleString()}`;
            document.getElementById('totalExpense').innerText = `₹${totalEx.toLocaleString()}`;
            const netProfit = totalIn - totalEx;
            document.getElementById('netProfit').innerText = `₹${netProfit.toLocaleString()}`;
            
            const margin = totalIn > 0 ? Math.round((netProfit / totalIn) * 100) : 0;
            document.getElementById('marginText').innerText = `${margin}%`;
            document.getElementById('marginStatus').innerText = margin >= 0 ? 'Healthy' : 'Deficit';
            updateCharts(sortedMonths.slice(0, 6).reverse(), data, margin);
        }

        function updateCharts(labels, data, margin) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if(revenueChart) revenueChart.destroy();
            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.map(l => formatMonth(l)),
                    datasets: [
                        { label: 'Income', data: labels.map(l => data[l].income), backgroundColor: '#22c55e', borderRadius: 5, barPercentage: 0.5 },
                        { label: 'Expense', data: labels.map(l => data[l].expense), backgroundColor: '#d91421', borderRadius: 5, barPercentage: 0.5 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#52525b', font: { weight: 'bold', size: 9 } } } }
                }
            });

            const gtx = document.getElementById('profitGauge').getContext('2d');
            if(profitGauge) profitGauge.destroy();
            profitGauge = new Chart(gtx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [Math.max(0, margin), Math.max(0, 100 - margin)],
                        backgroundColor: ['#22c55e', '#18181b'],
                        borderWidth: 0,
                        circumference: 270,
                        rotation: 225,
                        borderRadius: 15
                    }]
                },
                options: { cutout: '85%', plugins: { tooltip: { enabled: false } } }
            });
        }

        function formatMonth(code) {
            const [y, m] = code.split('-');
            return new Date(y, m - 1).toLocaleString('default', { month: 'short', year: '2-digit' });
        }

        window.downloadMonthPDF = (monthCode) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const data = globalMonthlyData[monthCode];
            doc.setFontSize(18); doc.text(`GymFlow: ${formatMonth(monthCode)} Report`, 14, 20);
            doc.autoTable({
                startY: 30,
                head: [['Label', 'Amount']],
                body: [['Income', `Rs. ${data.income}`], ['Expense', `Rs. ${data.expense}`], ['Net Profit', `Rs. ${data.income - data.expense}`]],
                theme: 'striped'
            });
            doc.save(`Report_${monthCode}.pdf`);
        };

        window.downloadFullReport = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("GymFlow | Full Revenue Analytics", 14, 20);
            const rows = Object.keys(globalMonthlyData).sort().reverse().map(code => [
                formatMonth(code),
                globalMonthlyData[code].income.toLocaleString(),
                globalMonthlyData[code].expense.toLocaleString(),
                (globalMonthlyData[code].income - globalMonthlyData[code].expense).toLocaleString()
            ]);
            doc.autoTable({
                startY: 30,
                head: [['Month', 'Income (Rs.)', 'Expense (Rs.)', 'Net Profit (Rs.)']],
                body: rows,
                headStyles: { fillColor: [13, 17, 15] }
            });
            doc.save("GymFlow_Full_Report.pdf");
        };

        init();
    </script>
</body>
</html>
