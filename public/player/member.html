<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <title>GymFlow | Elite</title>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; overflow-x: hidden; }
        .ios-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tap-active:active { transform: scale(0.94); transition: 0.1s; }
        
        /* Smooth Page Transitions */
        .page { position: absolute; width: 100%; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        .page-hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
        
        .xp-bar-fill { transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        
        .achievement-claimed {
            background: linear-gradient(135deg, #fef3c7 0%, #fffbeb 100%) !important;
            border: 2px solid #fbbf24 !important;
            color: #b45309 !important;
            box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.3);
        }

        /* Muscle Group Selection Styles */
        .muscle-chip input:checked + div { 
            background: #3b82f6; 
            color: white; 
            border-color: #3b82f6; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.25); 
        }
        
        .unlock-glow { animation: levelGlow 2s infinite; border: 2px solid #3b82f6 !important; }
        @keyframes levelGlow { 0%, 100% { opacity: 1; box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); } 50% { opacity: 0.8; box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); } }

        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="levelUpOverlay" class="hidden fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center p-8 text-center">
        <div class="w-32 h-32 bg-blue-600 rounded-[2.5rem] flex items-center justify-center text-white text-5xl font-black mb-6 shadow-2xl animate-bounce">
            <span id="popupNewLevel">2</span>
        </div>
        <h1 class="text-4xl font-black mb-2 tracking-tighter text-slate-900">NEW LEVEL</h1>
        <p class="text-slate-500 font-bold mb-10">Your power has increased. Claim your rank.</p>
        <button onclick="confirmUnlock()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl tap-active">ASCEND NOW</button>
    </div>

    <div id="appContainer" class="hidden max-w-lg mx-auto p-4 pb-28 relative">
        
        <div id="dashboardPage" class="page space-y-6">
            <header class="flex justify-between items-center py-4">
                <div class="flex items-center gap-3">
                    <div id="hudLevelIcon" class="w-12 h-12 rounded-2xl bg-slate-900 text-white flex items-center justify-center font-black text-xl">1</div>
                    <div>
                        <h2 id="userName" class="text-xl font-extrabold tracking-tight">Athlete</h2>
                        <p id="rankName" class="text-[9px] font-black text-blue-600 uppercase tracking-widest tracking-tighter">RECRUIT</p>
                    </div>
                </div>
                <div id="unlockAlert" class="hidden bg-blue-600 text-white px-4 py-2 rounded-full text-[10px] font-black animate-pulse cursor-pointer" onclick="switchTab('armory')">
                    LEVEL READY ⚡
                </div>
            </header>

            <div class="ios-card p-5 border-l-4 border-l-emerald-500">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Daily Discipline</p>
                    <span class="text-orange-500 font-black text-xs" id="streakFlame">🔥 0 STREAK</span>
                </div>
                <button id="attBtn" onclick="markAttendance()" class="w-full py-4 bg-slate-50 rounded-2xl font-bold text-sm tap-active border border-slate-200">
                    Mark Attendance (+50 XP)
                </button>
            </div>

            <div class="ios-card p-6 text-center">
                <div id="timerBox" class="hidden mb-2">
                    <p id="timer" class="text-5xl font-black tabular-nums tracking-tighter text-slate-900">00:00:00</p>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6">Battle Engine</p>
                <button id="workoutBtn" onclick="handleWorkoutToggle()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-100 tap-active">Start Workout</button>
                
                <div class="mt-8 text-left">
                    <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-2">
                        <span>Level Progress</span>
                        <span id="xpLabel">0 / 500 XP</span>
                    </div>
                    <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                        <div id="xpBar" class="xp-bar-fill h-full rounded-full" style="width: 0%"></div>
                    </div>
                    <p class="text-[9px] text-slate-400 mt-2 font-bold uppercase">Total Points: <span id="hudTotalXP">0</span></p>
                </div>
            </div>
        </div>

        <div id="armoryPage" class="page page-hidden space-y-6">
            <h3 class="text-2xl font-black px-2 mt-4">The Armory</h3>
            <div id="levelList" class="space-y-3 pb-10"></div>
        </div>

        <div id="historyPage" class="page page-hidden space-y-6">
            <h3 class="text-2xl font-black px-2 mt-4">Battle Logs</h3>
            <div id="logList" class="space-y-3"></div>
        </div>
    </div>

    <div id="focusOverlay" class="hidden fixed inset-0 z-[600] bg-white p-8 overflow-y-auto">
        <h2 class="text-3xl font-black mb-1">Target Areas</h2>
        <p class="text-slate-400 font-bold text-sm mb-8">Select up to 3 focus groups for today.</p>
        
        <div class="grid grid-cols-2 gap-4 mb-10">
            <label class="muscle-chip tap-active"><input type="checkbox" value="Chest" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Chest</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="Back" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Back</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="Leg" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Leg</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="Arms" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Arms</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="Shoulder" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Shoulder</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="Abs" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Abs</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="Cardio" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">Cardio</div></label>
            <label class="muscle-chip tap-active"><input type="checkbox" value="General" class="hidden" onchange="checkLimit(this)"><div class="p-6 ios-card text-[11px] font-black text-center border-2 uppercase tracking-widest">General</div></label>
        </div>

        <button onclick="confirmWorkoutStart()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black shadow-xl tap-active">ENGAGE</button>
        <button onclick="document.getElementById('focusOverlay').classList.add('hidden')" class="w-full mt-4 text-slate-400 font-bold text-sm">Cancel</button>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center px-8 z-[100]">
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="flex flex-col items-center gap-1 text-blue-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="text-[8px] font-black uppercase">Home</span></button>
        <button onclick="switchTab('armory')" id="nav-armory" class="flex flex-col items-center gap-1 text-slate-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg><span class="text-[8px] font-black uppercase">Armory</span></button>
        <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center gap-1 text-slate-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2"/></svg><span class="text-[8px] font-black uppercase">Logs</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, setDoc, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBcsmX7T1NotMi0T1XZ6b03yI3r7qZYQr8",
            authDomain: "gym-membership-tracker-60626.firebaseapp.com",
            projectId: "gym-membership-tracker-60626",
            storageBucket: "gym-membership-tracker-60626.firebasestorage.app",
            messagingSenderId: "260703319955",
            appId: "1:260703319955:web:78206334baa1fc79725a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentMember = null;
        let timerInt = null;

        const getXPForLevel = (lvl) => Math.floor(500 * Math.pow(1.1, lvl - 1));
        const RANKS = ["Recruit", "Soldier", "Warrior", "Knight", "Paladin", "Slayer", "Titan", "Mythic", "Immortal", "God"];

        async function syncData() {
            if(!currentMember?.id) return;
            const snap = await getDoc(doc(db, "members", currentMember.id));
            if(snap.exists()) {
                currentMember = { id: snap.id, ...snap.data() };
                updateUI();
            }
        }

        window.switchTab = (tab) => {
            window.scrollTo({ top: 0, behavior: 'instant' });
            ['dashboard', 'armory', 'history'].forEach(p => {
                const pageEl = document.getElementById(p + 'Page');
                const navEl = document.getElementById('nav-' + p);
                if(p === tab) {
                    pageEl.classList.remove('page-hidden');
                    navEl.classList.replace('text-slate-400', 'text-blue-600');
                } else {
                    pageEl.classList.add('page-hidden');
                    navEl.classList.replace('text-blue-600', 'text-slate-400');
                }
            });
            if(tab === 'armory') renderArmory();
            if(tab === 'history') renderHistory();
        };

        function updateUI() {
            const xp = currentMember.totalXP || 0;
            const lvl = currentMember.unlockedLevel || 1;
            const nextXP = getXPForLevel(lvl);
            
            document.getElementById('userName').innerText = currentMember.name;
            document.getElementById('hudLevelIcon').innerText = lvl;
            document.getElementById('hudTotalXP').innerText = xp.toLocaleString();
            document.getElementById('xpLabel').innerText = `${xp % nextXP} / ${nextXP} XP`;
            document.getElementById('xpBar').style.width = `${(xp % nextXP) / nextXP * 100}%`;
            document.getElementById('rankName').innerText = RANKS[Math.min(Math.floor(lvl/5), RANKS.length-1)];
            document.getElementById('streakFlame').innerText = `🔥 ${currentMember.streak || 0} STREAK`;

            const attBtn = document.getElementById('attBtn');
            const todayStr = new Date().toLocaleDateString();
            if(currentMember.lastAttendance === todayStr) {
                attBtn.innerText = "MISSION COMPLETE ✓";
                attBtn.classList.add('achievement-claimed');
                attBtn.onclick = null;
            } else {
                attBtn.innerText = "Mark Attendance (+50 XP)";
                attBtn.classList.remove('achievement-claimed');
                attBtn.onclick = markAttendance;
            }

            if(xp >= nextXP) document.getElementById('unlockAlert').classList.remove('hidden');
            else document.getElementById('unlockAlert').classList.add('hidden');

            const workBtn = document.getElementById('workoutBtn');
            if(currentMember.isInside) {
                workBtn.innerText = "END SESSION";
                workBtn.className = "w-full bg-red-500 text-white py-5 rounded-3xl font-black shadow-lg shadow-red-200 tap-active";
                document.getElementById('timerBox').classList.remove('hidden');
                startLiveTimer();
            } else {
                workBtn.innerText = "START WORKOUT";
                workBtn.className = "w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-100 tap-active";
                document.getElementById('timerBox').classList.add('hidden');
                clearInterval(timerInt);
                timerInt = null;
            }
        }

        window.markAttendance = async () => {
            const todayISO = new Date().toISOString().split('T')[0];
            const displayDate = new Date().toLocaleDateString();
            const newXP = (currentMember.totalXP || 0) + 50;
            const newStreak = (currentMember.streak || 0) + 1;

            try {
                // Update User Record
                await updateDoc(doc(db, "members", currentMember.id), { 
                    totalXP: newXP, 
                    streak: newStreak,
                    lastAttendance: displayDate 
                });

                // Sync Global Attendance for Admin (Attendance Dashboard)
                const attRef = doc(db, "attendance", todayISO);
                await setDoc(attRef, { 
                    presentIds: arrayUnion(currentMember.id),
                    gymId: currentMember.gymId || "default",
                    lastUpdated: new Date()
                }, { merge: true });

                confetti({ particleCount: 60, colors: ['#fbbf24', '#ffffff'] });
                await syncData();
            } catch (error) {
                console.error("Attendance Sync Error:", error);
                alert("Connection error. Please try again.");
            }
        };

        window.handleWorkoutToggle = () => {
            if(currentMember.isInside) { if(confirm("Submit Battle Log?")) endWorkout(); }
            else {
                document.querySelectorAll('#focusOverlay input').forEach(i => i.checked = false);
                document.getElementById('focusOverlay').classList.remove('hidden');
            }
        };

        window.checkLimit = (input) => {
            if(document.querySelectorAll('#focusOverlay input:checked').length > 3) {
                input.checked = false;
                alert("Choose max 3 groups.");
            }
        };

        window.confirmWorkoutStart = async () => {
            const parts = Array.from(document.querySelectorAll('#focusOverlay input:checked')).map(i => i.value);
            if(parts.length === 0) return alert("Select at least one group.");
            const now = new Date().toISOString();
            await updateDoc(doc(db, "members", currentMember.id), { isInside: true, lastIn: now, activeWorkoutParts: parts });
            document.getElementById('focusOverlay').classList.add('hidden');
            syncData();
        };

        async function endWorkout() {
            clearInterval(timerInt);
            timerInt = null;
            const diff = Math.round((new Date() - new Date(currentMember.lastIn)) / 60000);
            const earned = Math.max(10, diff * 10);
            await updateDoc(doc(db, "members", currentMember.id), { 
                isInside: false, 
                totalXP: (currentMember.totalXP || 0) + earned,
                workoutHistory: arrayUnion({ 
                    date: new Date().toLocaleDateString(), 
                    duration: diff+'m', 
                    xp: earned, 
                    muscles: currentMember.activeWorkoutParts || ["Gym"] 
                })
            });
            confetti({ particleCount: 200, spread: 80 });
            syncData();
        }

        function startLiveTimer() {
            if(timerInt) return;
            timerInt = setInterval(() => {
                const diff = new Date() - new Date(currentMember.lastIn);
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        window.renderArmory = () => {
            const list = document.getElementById('levelList');
            const userLvl = currentMember.unlockedLevel || 1;
            const userXP = currentMember.totalXP || 0;
            let html = '';
            for(let i=1; i<=20; i++) {
                const req = getXPForLevel(i);
                const unlocked = i <= userLvl;
                const canUnlock = !unlocked && i === userLvl + 1 && userXP >= req;
                html += `
                    <div class="ios-card p-5 flex items-center gap-4 ${unlocked ? 'border-blue-100' : 'grayscale opacity-50'} ${canUnlock ? 'unlock-glow grayscale-0 opacity-100' : ''}">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center font-black">${unlocked ? i : '🔒'}</div>
                        <div class="flex-1">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Req: ${req} XP</p>
                            <p class="text-sm font-extrabold">Level ${i}</p>
                        </div>
                        ${canUnlock ? `<button onclick="openUnlockPopup(${i})" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black">ASCEND</button>` : ''}
                    </div>
                `;
            }
            list.innerHTML = html;
        };

        window.openUnlockPopup = (lvl) => {
            document.getElementById('popupNewLevel').innerText = lvl;
            document.getElementById('levelUpOverlay').classList.remove('hidden');
        };

        window.confirmUnlock = async () => {
            const next = (currentMember.unlockedLevel || 1) + 1;
            await updateDoc(doc(db, "members", currentMember.id), { unlockedLevel: next });
            document.getElementById('levelUpOverlay').classList.add('hidden');
            confetti({ particleCount: 300, spread: 100 });
            await syncData();
            switchTab('dashboard');
        };

        window.renderHistory = () => {
            const list = document.getElementById('logList');
            list.innerHTML = (currentMember.workoutHistory || []).reverse().map(l => `
                <div class="ios-card p-4 flex justify-between items-center mb-3">
                    <div><p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${l.date}</p><p class="text-xs font-bold text-blue-600">${l.muscles.join(' • ')}</p></div>
                    <div class="text-right"><p class="font-black text-xs text-slate-900">+${l.xp} XP</p><p class="text-[10px] text-slate-400 font-bold">${l.duration}</p></div>
                </div>
            `).join('') || '<p class="text-center py-20 text-slate-300 font-black uppercase tracking-widest">No Logs Found</p>';
        };

        // Initialize App - Key Fix: Use 'memberId' to match the login page
        const authId = localStorage.getItem('memberId'); 
        if(authId) {
            getDoc(doc(db, "members", authId)).then(s => {
                if(s.exists()) {
                    currentMember = { id: s.id, ...s.data() };
                    document.getElementById('appContainer').classList.remove('hidden');
                    updateUI();
                } else { window.location.href = "player/member-login.html"; }
            });
        } else { window.location.href = "player/member-login.html"; }
    </script>
</body>
</html>
