<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>GymFlow Pro | Dashboard</title>
    <style>
        :root { --bg-canvas: #f1f5f9; --glass: rgba(255, 255, 255, 0.7); }
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.08) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(29, 78, 216, 0.05) 0px, transparent 50%),
                        var(--bg-canvas);
            min-height: 100vh;
        }
        .glass-sidebar { background: var(--glass); backdrop-filter: blur(20px) saturate(180%); border-right: 1px solid rgba(255, 255, 255, 0.3); }
        .glass-card { background: white; border: 1px solid rgba(226, 232, 240, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); border-radius: 2rem; }
        
        /* Custom Separation Styles */
        .due-row { background-color: #fffafa !important; }
        .due-row:hover td { background-color: #fff5f5 !important; }
        .settled-row { opacity: 0.7; }
        .section-divider { background: #f8fafc; border-top: 2px solid #e2e8f0; border-bottom: 2px solid #e2e8f0; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <div class="flex flex-col lg:flex-row">
        <aside class="w-full lg:w-72 lg:glass-sidebar lg:h-screen lg:sticky lg:top-0 p-8 flex flex-col">
            <div class="mb-12">
                <h1 class="text-2xl font-extrabold tracking-tighter italic">GymFlow<span class="text-blue-600">.</span></h1>
                <p id="displayGymName" class="text-[9px] font-black text-blue-500 uppercase tracking-[0.2em] mt-2"></p>
            </div>

            <nav id="sidebarContainer" class="space-y-1 flex-1">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 ml-2">Management</p>
                
                <button onclick="setFilter('all')" id="btnFilterAll" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold bg-slate-900 text-white shadow-sm mb-2 transition-all">
                    <span>👥 Members</span>
                    <span id="countAll" class="text-[10px] opacity-50 font-black">0</span>
                </button>
                
                <button onclick="setFilter('unpaid')" id="btnFilterUnpaid" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 bg-transparent hover:bg-white/50 transition mb-2">
                    <span>⏳ Pending Dues</span>
                    <span id="countUnpaid" class="text-[10px] text-red-500 font-black">0</span>
                </button>

                <a href="expense.html" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-blue-50 hover:text-blue-600 transition group">
                    <span>📊 Expenses</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-0 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                </a>
                <a href="revenue.html" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-blue-50 hover:text-blue-600 transition group">
                      <span>📈 Revenue Insights</span>
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-0 group-hover:opacity-100 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                </a>
            </nav>

            <button onclick="logout()" class="mt-auto flex items-center gap-3 text-xs font-bold text-slate-400 hover:text-red-500 transition">🚪 Sign Out</button>
        </aside>

        <main class="flex-1 p-6 lg:p-10">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                <div class="glass-card p-8">
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Total Roster</p>
                    <h3 id="statTotal" class="text-5xl font-extrabold tracking-tighter">0</h3>
                </div>
                <div class="glass-card p-8 bg-blue-50/50 border-blue-100">
                    <p class="text-[11px] font-bold text-blue-600 uppercase tracking-widest mb-4">Lifetime Revenue</p>
                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-bold text-blue-600 italic">₹</span>
                        <h3 id="statRevenue" class="text-4xl font-extrabold tracking-tighter">0</h3>
                    </div>
                </div>
                <div class="glass-card p-8 bg-slate-900 text-white border-none shadow-2xl">
                    <span id="statPercent" class="text-blue-400 font-black text-sm">0%</span>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden mt-8">
                        <div id="statBar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
                <div class="glass-card p-8 bg-blue-600 text-white border-none shadow-xl cursor-pointer group" onclick="document.getElementById('regSection').classList.toggle('hidden')">
                    <p class="text-[11px] font-bold text-blue-200 uppercase tracking-widest mb-4">Quick Action</p>
                    <h3 class="text-2xl font-extrabold leading-tight">Add New Member <span class="group-hover:translate-x-2 inline-block transition">→</span></h3>
                </div>
            </div>

            <section class="mb-12">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                    <div>
                        <h2 class="text-2xl font-black tracking-tight text-slate-900">Live on Floor</h2>
                        <p id="countTraining" class="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">0 MEMBERS TRAINING NOW</p>
                    </div>
                    
                    <div id="liveFilterContainer" class="flex gap-2 overflow-x-auto no-scrollbar py-2">
                        <button onclick="setLiveFilter('all')" class="live-f-btn px-4 py-2 rounded-xl text-[8px] font-black uppercase bg-slate-900 text-white shadow-sm whitespace-nowrap">All</button>
                        <button onclick="setLiveFilter('Chest')" class="live-f-btn px-4 py-2 rounded-xl text-[8px] font-black uppercase bg-white border border-slate-100 text-slate-400 whitespace-nowrap">Chest</button>
                        <button onclick="setLiveFilter('Back')" class="live-f-btn px-4 py-2 rounded-xl text-[8px] font-black uppercase bg-white border border-slate-100 text-slate-400 whitespace-nowrap">Back</button>
                        <button onclick="setLiveFilter('Legs')" class="live-f-btn px-4 py-2 rounded-xl text-[8px] font-black uppercase bg-white border border-slate-100 text-slate-400 whitespace-nowrap">Legs</button>
                        <button onclick="setLiveFilter('Shoulders')" class="live-f-btn px-4 py-2 rounded-xl text-[8px] font-black uppercase bg-white border border-slate-100 text-slate-400 whitespace-nowrap">Shoulders</button>
                        <button onclick="setLiveFilter('Cardio')" class="live-f-btn px-4 py-2 rounded-xl text-[8px] font-black uppercase bg-white border border-slate-100 text-slate-400 whitespace-nowrap">Cardio</button>
                    </div>
                </div>
                <div id="liveMembersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            </section>

            <section id="regSection" class="hidden glass-card p-8 mb-12 border-2 border-blue-100 shadow-2xl">
                <h3 class="text-xl font-black mb-6">New Member Registration</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input id="regName" placeholder="Full Name" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none">
                    <input id="regPhone" placeholder="Phone Number" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none">
                    <input id="regPlan" list="planOptions" placeholder="Plan" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none">
                    <datalist id="planOptions"><option value="Normal"><option value="Cardio"><option value="Personal Training"></datalist>
                    <input id="regMonthlyFee" type="number" placeholder="Monthly Fee (₹)" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none">
                    <input id="regJoiningFee" type="number" placeholder="Joining Fee (₹)" class="bg-slate-50 p-4 rounded-xl border border-slate-200 outline-none">
                </div>
                <div class="mt-8 flex justify-end"><button onclick="addNewMember()" class="bg-slate-900 text-white font-black px-12 py-4 rounded-xl uppercase text-xs">Save Member</button></div>
            </section>

            <div class="flex justify-between items-center mb-6">
                <h2 id="listTitle" class="text-3xl font-extrabold tracking-tight">Active Roster</h2>
                <input id="searchBar" type="text" placeholder="Search..." class="bg-white border border-slate-200 px-6 py-3 rounded-2xl text-sm outline-none w-64">
            </div>

            <div class="glass-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Member Name</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Payment Status</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="memberTableBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
                <div class="bg-slate-50/30 p-6 flex justify-between items-center border-t border-slate-100">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Page <span id="currentPageNum">1</span> of <span id="totalPageNum">1</span></p>
                    <div class="flex gap-4">
                        <button onclick="changePage(-1)" id="prevBtn" class="text-xs font-black uppercase text-slate-400 hover:text-slate-900">← Prev</button>
                        <button onclick="changePage(1)" id="nextBtn" class="text-xs font-black uppercase text-slate-400 hover:text-slate-900">Next →</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="profileModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] w-full max-w-lg p-10 shadow-2xl relative">
            <button onclick="closeProfile()" class="absolute top-8 right-8 text-slate-300 hover:text-slate-900 text-2xl font-bold">✕</button>
            <div class="mb-8">
                <div id="profStatusBadge" class="inline-block text-[9px] font-black px-3 py-1 rounded-full uppercase mb-4 shadow-sm">STATUS</div>
                <h2 id="profName" class="text-4xl font-extrabold tracking-tighter text-slate-900">Member</h2>
                <p id="profPhone" class="text-slate-400 text-sm font-medium mt-1"></p>
            </div>
            <div id="currentMonthContainer" class="mb-8"></div>
            <div class="border-t border-slate-100 pt-6">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Payment History</p>
                <div id="historyList" class="space-y-2 max-h-56 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
            <div class="flex justify-between items-center mt-10 border-t border-slate-100 pt-8">
                <button id="statusToggleBtn" class="text-[10px] font-black uppercase text-slate-400 hover:text-red-500">Pause Member</button>
                <button onclick="deleteMember()" class="text-[10px] font-black uppercase text-red-300 hover:text-red-600">Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        window.logout = () => { localStorage.clear(); location.href = "login.html"; };
        window.closeProfile = () => { document.getElementById('profileModal').classList.add('hidden'); window.dispatchEvent(new CustomEvent('profileClosed')); };
    </script>
</body>
</html>
