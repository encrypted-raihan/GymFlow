<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>GymFlow | Cash Flow</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .expense-card { transition: transform 0.2s; }
        .expense-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 id="currentMonthTitle" class="text-3xl font-black tracking-tight text-slate-900 italic">March 2026</h1>
                <p class="text-blue-600 font-bold text-[10px] uppercase tracking-widest">Expense & Payroll Ledger</p>
            </div>
            <button onclick="location.href='dashboard.html'" class="bg-white border border-slate-200 p-3 rounded-2xl hover:bg-slate-50 transition shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </button>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white mb-10 shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2">Total Monthly Spend</p>
                <h2 id="totalSpend" class="text-6xl font-black tracking-tighter">₹0</h2>
                
                <div class="grid grid-cols-2 gap-4 mt-8 pt-8 border-t border-white/10">
                    <div>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Fixed (Rent/Elec)</p>
                        <p id="fixedTotal" class="text-xl font-bold">₹0</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Staff Payroll</p>
                        <p id="staffTotal" class="text-xl font-bold text-blue-400">₹0</p>
                    </div>
                </div>
            </div>
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-600/20 rounded-full blur-[80px]"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <div class="lg:col-span-1 glass p-8 rounded-[2rem] shadow-sm h-fit">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Log New Bill</h3>
                <div class="space-y-4">
                    <select id="expCategory" class="w-full bg-slate-50 p-4 rounded-2xl border-none text-sm font-bold outline-none">
                        <option value="Rent">🏢 Monthly Rent</option>
                        <option value="Electricity">⚡ Electricity</option>
                        <option value="Maintenance">🛠️ Maintenance</option>
                        <option value="Equipment">🏋️ Equipment</option>
                        <option value="Misc">📦 Miscellaneous</option>
                    </select>
                    <input id="expTitle" type="text" placeholder="Label (e.g. Water Bill)" class="w-full bg-slate-50 p-4 rounded-2xl border-none text-sm outline-none font-medium">
                    <input id="expAmount" type="number" placeholder="Amount (₹)" class="w-full bg-slate-50 p-4 rounded-2xl border-none text-sm font-black text-blue-600 outline-none">
                    <button onclick="addExpense()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Add to Ledger</button>
                </div>
            </div>

            <div class="lg:col-span-1 glass p-8 rounded-[2rem] shadow-sm h-fit">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6">Staff Registry</h3>
                <div class="space-y-3 mb-6 pb-6 border-b border-slate-200/50">
                    <input id="staffName" type="text" placeholder="Staff Name" class="w-full bg-slate-50 p-3 rounded-xl border-none text-xs outline-none">
                    <div class="flex gap-2">
                        <input id="staffBaseSalary" type="number" placeholder="Base Salary (₹)" class="flex-1 bg-slate-50 p-3 rounded-xl border-none text-xs outline-none font-bold text-blue-600">
                        <button onclick="addStaff()" class="bg-slate-900 text-white px-4 rounded-xl text-[10px] font-black uppercase">Add</button>
                    </div>
                </div>
                <div id="staffList" class="space-y-3 max-h-80 overflow-y-auto no-scrollbar">
                    </div>
            </div>

            <div class="lg:col-span-1">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 px-2">Transactions</h3>
                <div id="expenseList" class="space-y-3 max-h-[500px] overflow-y-auto no-scrollbar">
                    </div>
            </div>
        </div>

        <div class="border-t border-slate-200 pt-10 pb-20">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 px-2">Financial History</h3>
            <div id="archiveList" class="grid grid-cols-1 md:grid-cols-3 gap-4 opacity-70 hover:opacity-100 transition-opacity">
                </div>
        </div>
    </div>

    <script type="module" src="expense.js"></script>
</body>
</html>
